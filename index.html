<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Programme 💪">
<title>Mon Programme 💪</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0F0F1A;color:#F1F1F5;font-family:-apple-system,system-ui,sans-serif;padding-bottom:80px;min-height:100vh}
button,input,textarea,select{font-family:inherit;cursor:pointer;outline:none}
input[type=date],select{color-scheme:dark}
.hdr{background:linear-gradient(135deg,#1A1A2E,#16213E);padding:52px 20px 14px;border-bottom:1px solid #2D2D3F}
.hdr-sub{font-size:9px;color:#6B7280;letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px}
.hdr h1{font-size:20px;font-weight:900;letter-spacing:-.02em}
.hdr-desc{font-size:11px;color:#6B7280;margin-top:3px}
.content{padding:14px 16px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#0F0F1A;border-top:1px solid #2D2D3F;display:flex;padding:6px 8px env(safe-area-inset-bottom,14px)}
.nbtn{flex:1;border:none;background:transparent;padding:6px 2px;display:flex;flex-direction:column;align-items:center;gap:2px}
.nem{font-size:18px;opacity:.35}
.nlb{font-size:9px;font-weight:700;color:#6B7280}
.nbtn.act .nem{opacity:1}.nbtn.act .nlb{color:#3B82F6}
.tab{display:none}.tab.act{display:block}
.card{background:#1E1E2E;border-radius:14px;padding:14px;border:1px solid #2D2D3F;margin-bottom:12px}
.slbl{font-size:10px;color:#6B7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-block}
.pill-row{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.pill{flex:1;min-width:60px;padding:10px 4px;border-radius:11px;border:1.5px solid #2D2D3F;background:#1E1E2E;text-align:center}
.pill.act{border-color:#3B82F6;background:#1E3A5F}
.pill .pe{font-size:16px;margin-bottom:2px}
.pill .pl{font-size:10px;font-weight:700;color:#6B7280}
.pill.act .pl{color:#93C5FD}
.wbtn{width:34px;height:34px;border-radius:9px;border:none;font-weight:700;font-size:12px;background:#1E1E2E;color:#6B7280;position:relative}
.wbtn.act{background:#3B82F6;color:#fff}
.wbtn.decharge{border:1.5px solid #F59E0B!important;color:#F59E0B}
.wbtn.vacances{border:1.5px solid #06B6D4!important;color:#06B6D4}
.wbtn.vacances.act{background:#06B6D4;color:#fff}
.fbadge{margin-top:10px;padding:8px 12px;border-radius:10px;background:#1E3A5F;border:1px solid #3B82F640;font-size:12px;color:#93C5FD}
.fbadge.db{background:#2D1F00;border-color:#F59E0B40;color:#FCD34D}
.fbadge.vb{background:#0F2B2B;border-color:#06B6D440;color:#67E8F9}
.dbtn{flex:1;padding:7px 3px;border-radius:9px;border:1.5px solid #2D2D3F;background:transparent;position:relative}
.dlbl{font-size:8px;font-weight:700;color:#6B7280;margin-bottom:3px}
.ddot{position:absolute;top:2px;right:2px;width:6px;height:6px;border-radius:50%;background:#10B981}
.exc{display:flex;align-items:center;gap:10px;padding:9px;background:#14141F;border-radius:9px;margin-bottom:7px}
.esvg{min-width:44px;display:flex;justify-content:center}
.enm{font-size:12px;font-weight:700;color:#F1F1F5}
.emu{font-size:10px;color:#6B7280}
.elo{text-align:right}
.eset{font-size:11px;font-weight:700}
.ekg{font-size:10px;color:#9CA3AF}
.pb-wrap{margin-bottom:7px}
.pb-lbl{display:flex;justify-content:space-between;margin-bottom:3px}
.pb-bg{height:3px;background:#2D2D3F;border-radius:2px}
.pb-fill{height:100%;border-radius:2px;transition:width .4s}
.btn-p{width:100%;padding:11px;border-radius:10px;border:none;background:#3B82F6;color:#fff;font-size:13px;font-weight:700}
.btn-g{width:100%;padding:11px;border-radius:10px;border:none;background:#10B981;color:#fff;font-size:13px;font-weight:700}
.btn-s{width:100%;padding:11px;border-radius:10px;border:1px solid #2D2D3F;background:transparent;color:#6B7280;font-size:13px}
.ybox{padding:9px 12px;border-radius:9px;background:#FEF3C720;border:1px solid #F59E0B50;font-size:11px;color:#FCD34D;line-height:1.5;margin-bottom:10px}
.gbox{padding:9px 12px;border-radius:9px;background:#0F2B1F;border:1px solid #10B98130;font-size:11px;color:#A7F3D0;line-height:1.5;margin-top:12px}
.cbox{padding:9px 12px;border-radius:9px;background:#2D1A00;border:1px solid #F59E0B40;font-size:11px;color:#FCD34D;margin-bottom:10px}
.jinp{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #2D2D3F;background:#14141F;color:#F1F1F5;font-size:12px}
.rrow{display:flex;gap:6px;margin-bottom:10px}
.rbtn{flex:1;padding:6px 4px;border-radius:8px;border:1px solid #2D2D3F;background:#14141F;color:#6B7280;font-size:10px;font-weight:600}
.rbtn.act{border-color:#3B82F6;background:#1E3A5F;color:#93C5FD}
.meal-card{background:#1E1E2E;border-radius:13px;border:1px solid #2D2D3F;overflow:hidden;margin-bottom:9px}
.meal-hdr{padding:13px;display:flex;align-items:center;gap:10px}
.meal-body{border-top:1px solid #2D2D3F;padding:12px}
.macbox{flex:1;background:#1E1E2E;border-radius:11px;padding:11px}
.mval{font-size:18px;font-weight:800}
.ebtn{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border:1.5px solid #2D2D3F;background:#1E1E2E;text-align:left;width:100%;margin-bottom:8px}
.ebtn.sel{border-color:#F59E0B;background:#2D1F00}
.sbox{flex:1;background:#1E1E2E;border-radius:11px;padding:12px}
.igrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.icell{background:#14141F;border-radius:10px;padding:10px}
.ival{font-size:16px;font-weight:800}
.ilbl{font-size:9px;color:#6B7280;margin-bottom:3px;line-height:1.2}
.itgt{font-size:8px;color:#4B5563;margin-top:2px}
.igform{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.iflbl{font-size:9px;color:#6B7280;margin-bottom:3px}
input[type=number],input[type=date],input[type=text]{background:#14141F;border:1px solid #2D2D3F;border-radius:8px;color:#F1F1F5;padding:8px 10px;font-size:12px;width:100%}
select{background:#14141F;border:1px solid #2D2D3F;border-radius:8px;color:#F1F1F5;padding:8px 10px;font-size:12px;width:100%}
textarea{background:#14141F;border:1px solid #2D2D3F;border-radius:8px;color:#F1F1F5;padding:8px 10px;font-size:12px;width:100%;resize:none}
.ssup{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:3px 11px;margin-bottom:9px;border:1.5px solid}
.exk{background:#1E1E2E;border-radius:11px;padding:11px;border:1px solid #2D2D3F;margin-bottom:7px}
.exk.open{border-color:var(--ec)}
.edesc{margin-top:9px;padding-top:9px;border-top:1px solid #2D2D3F;font-size:11px;color:#A1A1B5;line-height:1.6}
/* Nutrition tracker styles */
.food-item{display:flex;align-items:center;gap:8px;padding:8px;background:#14141F;border-radius:9px;margin-bottom:6px;border:1px solid #2D2D3F}
.food-item.selected{border-color:#10B981;background:#0F2B1F}
.food-check{width:20px;height:20px;border-radius:6px;border:1.5px solid #374151;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px}
.food-item.selected .food-check{background:#10B981;border-color:#10B981}
.food-name{flex:1;font-size:12px;color:#F1F1F5}
.food-macros{font-size:10px;color:#6B7280;text-align:right}
.food-qty{width:55px;padding:4px 6px;border-radius:6px;border:1px solid #374151;background:#1E1E2E;color:#F1F1F5;font-size:11px;text-align:center}
.macro-summary{display:flex;gap:6px;margin:12px 0;padding:10px;background:#14141F;border-radius:10px}
.ms-item{flex:1;text-align:center}
.ms-val{font-size:16px;font-weight:800}
.ms-lbl{font-size:9px;color:#6B7280}
.reco-card{background:#0F2B1F;border:1px solid #10B98140;border-radius:12px;padding:12px;margin-top:10px}
.reco-item{padding:8px 0;border-bottom:1px solid #1A3A2A;font-size:12px;color:#D1FAE5;line-height:1.5}
.reco-item:last-child{border-bottom:none}
.day-total-bar{height:8px;border-radius:4px;background:#2D2D3F;overflow:hidden;margin:4px 0}
.day-total-fill{height:100%;border-radius:4px;transition:width .5s}
</style>
</head>

// ─── NUTRITION HELPERS ────────────────────────────────────────────────────────
function calcMacros(name, qty){
  const a = ALIMENTS[name];
  if(!a) return {k:0,p:0,g:0,l:0};
  return {
    k: Math.round(a.k * qty / 100),
    p: Math.round(a.p * qty / 100 * 10) / 10,
    g: Math.round(a.g * qty / 100 * 10) / 10,
    l: Math.round(a.l * qty / 100 * 10) / 10,
  };
}

function getSlotTotals(slotId){
  const sel = ST.nutSelections[slotId] || {};
  const manual = ST.nutManual[slotId] || [];
  let tk=0, tp=0;
  Object.entries(sel).forEach(([name, qty])=>{
    const m = calcMacros(name, qty);
    tk += m.k; tp += m.p;
  });
  manual.forEach(mi=>{
    const m = calcMacros(mi.n, mi.qty);
    tk += m.k; tp += m.p;
  });
  return {k: Math.round(tk), p: Math.round(tp*10)/10};
}

function getDayTotals(){
  let tk=0, tp=0;
  ['pdj','dej','gouter','snack','diner'].forEach(s=>{
    const t = getSlotTotals(s);
    tk += t.k; tp += t.p;
  });
  return {k: Math.round(tk), p: Math.round(tp*10)/10};
}

function genReco(slotId){
  // Calcule ce qui reste à manger après ce slot
  const slots = ['pdj','dej','gouter','snack','diner'];
  const idx = slots.indexOf(slotId);
  // Totaux déjà mangés (slots précédents + ce slot)
  let doneK=0, doneP=0;
  for(let i=0; i<=idx; i++){
    const t = getSlotTotals(slots[i]);
    doneK += t.k; doneP += t.p;
  }
  const resteK = Math.max(0, getTargetKcal() - doneK);
  const resteP = Math.max(0, TARGET_PROT - doneP);
  const nextSlots = slots.slice(idx+1);

  // Génère suggestions pour chaque slot restant
  const recos = {};
  if(nextSlots.length === 0) return recos;

  const kPerSlot = Math.round(resteK / nextSlots.length);
  const pPerSlot = Math.round(resteP / nextSlots.length);

  // Templates par slot
  const templates = {
    dej: (k,p) => {
      const items = [];
      if(p > 35) items.push({n:"Poulet (blanc, cuit)", qty:200});
      else items.push({n:"Thon (boîte, égoutté)", qty:140});
      if(k > 400) items.push({n:"Riz cuit", qty:150});
      items.push({n:"Brocolis (cuit)", qty:150});
      items.push({n:"Yaourt nature", qty:125});
      items.push({n:"Pomme", qty:150});
      return items;
    },
    snack: (k,p) => {
      const items = [];
      if(p > 20) items.push({n:"Whey protéine", qty:30});
      items.push({n:"Skyr", qty:150});
      if(k > 200) items.push({n:"Banane", qty:120});
      else items.push({n:"Kiwi", qty:80});
      return items;
    },
    diner: (k,p) => {
      const items = [];
      if(p > 35) items.push({n:"Bœuf haché 5%MG", qty:200});
      else if(p > 25) items.push({n:"Cabillaud (cuit)", qty:150});
      else items.push({n:"Œuf entier", qty:200});
      if(k > 400) items.push({n:"Pâtes cuites", qty:80});
      items.push({n:"Brocolis (cuit)", qty:150});
      items.push({n:"Tomates", qty:100});
      items.push({n:"Kiwi", qty:80});
      return items;
    }
  };

  nextSlots.forEach(s => {
    const fn = templates[s];
    recos[s] = fn ? fn(kPerSlot, pPerSlot) : [];
  });

  return {resteK, resteP, nextSlots, recos};
}

  h += `</div>`;

  if(Object.keys(sel).length > 0){
    h += `<button onclick="showReco('${ST.nutSlot}')" style="width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#10B981,#3B82F6);color:#fff;font-size:13px;font-weight:800;margin-bottom:8px">

    </button>`;
    h += `<button onclick="showAdvice24h()" style="width:100%;padding:12px;border-radius:12px;border:1.5px solid #8B5CF6;background:#14141F;color:#C4B5FD;font-size:13px;font-weight:800;margin-bottom:12px">
      🧠 Conseils nutrition 24h suivantes

  // Reco affichée
  if(ST.nutShowReco === ST.nutSlot){

        const recoItems = reco.recos[s] || [];
        if(recoItems.length === 0) return;
        let recoK=0, recoP=0;
        recoItems.forEach(function(ri){ const m=calcMacros(ri.n,ri.qty); recoK+=m.k; recoP+=m.p; });
        let recoItemsStr = '';
        recoItems.forEach(function(ri){
          const a = ALIMENTS[ri.n];
          if(recoItemsStr) recoItemsStr += ' · ';
          recoItemsStr += (a&&a.emoji?a.emoji:'🍽️') + ' ' + ri.n + ' (' + ri.qty + 'g)';
        });
        h += '<div class="reco-item">';
        h += '<b>' + slotInfo.emoji + ' ' + slotInfo.lbl + '</b> — ' + Math.round(recoK) + ' kcal · ' + Math.round(recoP) + 'g prot<br>';
        h += '<span style="color:#A7F3D0">' + recoItemsStr + '</span>';
        h += '</div>';
      });
      h += `<div style="display:flex;gap:8px;margin-top:10px">
        <button onclick="applyReco('${ST.nutSlot}')" class="btn-g" style="flex:2">Appliquer ce plan ✓</button>
        <button onclick="ST.nutShowReco=null;renderNut()" class="btn-s" style="flex:1">Ignorer</button>
      </div>
      </div>`;
    } else {
      h += `<div class="reco-card"><div style="color:#6EE7B7;font-size:12px">🎉 C'est le dernier repas de la journée — objectif atteint !</div></div>`;
    }
  }

  // Conseils 24h
  if(ST.show24h){
    const dayT2 = getDayTotals();
    const kLeft = Math.max(0, getTargetKcal() - dayT2.k);
    const pLeft = Math.max(0, TARGET_PROT - dayT2.p);
    const kTomorrow = ST.isSportDay ? 2400 : 2200;

    h += `<div class="card" style="border-color:#8B5CF640;margin-bottom:12px">
      <div style="font-weight:800;font-size:14px;color:#C4B5FD;margin-bottom:12px">🧠 Plan nutrition 24h</div>
      <div style="font-size:11px;color:#9CA3AF;margin-bottom:12px;line-height:1.6">
        <b style="color:#F1F1F5">Aujourd'hui</b> — Reste à manger : <b style="color:#F59E0B">${kLeft} kcal</b> · <b style="color:#3B82F6">${pLeft.toFixed(0)}g prot</b>
      </div>
      <div style="margin-bottom:10px;padding:10px;background:#14141F;border-radius:9px">
        <div style="font-size:10px;color:#C4B5FD;font-weight:700;margin-bottom:6px">Ce soir</div>
        <div style="font-size:11px;color:#D1D5DB;line-height:1.7">
          ${pLeft > 50 ? '⚠️ Gros déficit protéines — priorité absolue ce soir : 200g poulet ou 4 œufs + fromage blanc + shaker whey.' :
            pLeft > 30 ? '💪 Dîner riche en protéines : 200g bœuf haché + légumes. Rajoute un shaker whey si possible.' :
            pLeft > 15 ? '✅ Dîner normal : protéines maigres + légumes + 1 fruit.' :
            '🎯 Objectif quasi atteint — dîner léger suffira.'}
        </div>
      </div>
      <div style="padding:10px;background:#14141F;border-radius:9px">
        <div style="font-size:10px;color:#C4B5FD;font-weight:700;margin-bottom:6px">Demain (${kTomorrow} kcal · 165g prot)</div>
        <div style="font-size:11px;color:#D1D5DB;line-height:1.7">
          <b>Petit déj :</b> 3 œufs + skyr 150g → 50g prot<br>
          <b>Déjeuner :</b> ${kTomorrow > 2300 ? '200g poulet + riz 150g + légumes + yaourt + fruit → 60g prot' : '200g poulet + légumes + yaourt + fruit → 50g prot'}<br>
          <b>Goûter :</b> Skyr 150g + 1 fruit → 18g prot<br>
          <b>Dîner :</b> ${kTomorrow > 2300 ? '150g saumon + légumes + 1 fruit → 35g prot' : 'Cabillaud 150g + légumes + 1 fruit → 30g prot'}<br>
          <b>Total estimé :</b> ~${kTomorrow > 2300 ? '2350 kcal · 163g prot' : '2150 kcal · 148g prot'}

      </div>

  // Date selector + save button
  const today = new Date().toISOString().split('T')[0];

  const savedDay = (S.get('nutJournal')||{})[nutDate];

  h += `<div class="card" style="margin-top:4px">
    <div class="slbl">📅 Date du repas</div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
      <input type="date" id="nut-date" value="${nutDate}" onchange="setNutDate(this.value)" style="flex:1">
      <button onclick="saveDay()" style="padding:8px 12px;border-radius:9px;border:none;background:#10B981;color:#fff;font-size:12px;font-weight:700;white-space:nowrap">
        💾 Enregistrer
      </button>
    </div>
    ${savedDay ? `<div style="font-size:11px;color:#10B981;text-align:center">✓ Journée enregistrée — ${savedDay.totalK} kcal · ${savedDay.totalP}g prot</div>` : ''}
  </div>`;

  document.getElementById('t-nutrition').innerHTML = h;
}

function setNutSlot(s){ ST.nutSlot=s; ST.nutShowReco=null; renderNut(); }

function setNutDate(d){
  ST.nutDate = d;
  // Load saved data for this date if exists
  const saved = (S.get('nutJournal')||{})[d];
  if(saved && saved.selections){
    ST.nutSelections = JSON.parse(JSON.stringify(saved.selections));
    ST.nutManual = JSON.parse(JSON.stringify(saved.manual||{}));
  } else {
    ST.nutSelections = {};
    ST.nutManual = {};
  }
  renderNut();
}

function saveDay(){
  const date = ST.nutDate || new Date().toISOString().split('T')[0];
  const dayT = getDayTotals();
  const journal = S.get('nutJournal') || {};
  journal[date] = {
    date,
    selections: JSON.parse(JSON.stringify(ST.nutSelections)),
    manual: JSON.parse(JSON.stringify(ST.nutManual||{})),
    totalK: dayT.k,
    totalP: dayT.p,
    savedAt: new Date().toLocaleTimeString('fr-FR')
  };
  S.set('nutJournal', journal);
  renderNut();
  // Petit flash de confirmation
  const btn = document.querySelector('#t-nutrition button[onclick="saveDay()"]');
  if(btn){ btn.textContent = '✓ Sauvegardé !'; setTimeout(()=>{ btn.textContent = '💾 Enregistrer'; }, 2000); }
}

function togFood(slot, name, defaultQty){
  if(!ST.nutSelections[slot]) ST.nutSelections[slot]={};
  if(ST.nutSelections[slot].hasOwnProperty(name)){
    delete ST.nutSelections[slot][name];
  } else {
    ST.nutSelections[slot][name] = defaultQty;
  }
  ST.nutShowReco=null;
  renderNut();
}

function updateQty(slot, name, val){
  if(!ST.nutSelections[slot]) ST.nutSelections[slot]={};
  ST.nutSelections[slot][name] = parseFloat(val)||0;
  renderNut();
}

function addFreeItem(slot){
  const sel = document.getElementById('free-select');
  const qty = parseFloat(document.getElementById('free-qty').value);
  if(!sel.value || !qty || qty<=0) return;
  if(!ST.nutManual[slot]) ST.nutManual[slot]=[];
  ST.nutManual[slot].push({n:sel.value, qty:qty});
  ST.nutShowReco=null;
  renderNut();
}

function updateManualQty(slot, idx, val){
  if(!ST.nutManual[slot]) return;
  ST.nutManual[slot][idx].qty = parseFloat(val)||0;
  renderNut();
}

function removeManual(slot, idx){
  if(!ST.nutManual[slot]) return;
  ST.nutManual[slot].splice(idx,1);
  renderNut();
}

function showReco(slot){ ST.nutShowReco=slot; renderNut(); }

function addCustomItem(slot){
  const name = document.getElementById('custom-name').value.trim();
  const kcal = parseFloat(document.getElementById('custom-kcal').value);
  const prot = parseFloat(document.getElementById('custom-prot').value)||0;
  const gluc = parseFloat(document.getElementById('custom-gluc').value)||0;
  const lip  = parseFloat(document.getElementById('custom-lip').value)||0;
  if(!name || isNaN(kcal)) return;
  // Add to ALIMENTS dynamically
  ALIMENTS[name] = {k:kcal, p:prot, g:gluc, l:lip, emoji:"🍽️", cat:"Personnalisé"};
  if(!ST.nutManual[slot]) ST.nutManual[slot]=[];
  ST.nutManual[slot].push({n:name, qty:100, custom:true, kcal, prot, gluc, lip});
  ST.nutShowReco=null;
  renderNut();
}

function showAdvice24h(){
  ST.show24h = !ST.show24h;
  renderNut();
}

function applyReco(slot){
  const reco = genReco(slot);
  if(!reco || !reco.nextSlots) return;
  reco.nextSlots.forEach(s=>{
    if(!ST.nutSelections[s]) ST.nutSelections[s]={};
    (reco.recos[s]||[]).forEach(ri=>{
      ST.nutSelections[s][ri.n] = ri.qty;
    });
  });
  ST.nutShowReco=null;
  renderNut();
}

// ─── SEMAINE ─────────────────────────────────────────────────────────────────

    const cls=['wbtn',wp.week===ST.week?'act':'',wp.decharge?'decharge':wp.vacances?'vacances':''].join(' ');
    h+=`<button class="${cls}" onclick="selW(${wp.week})" style="position:relative">${wp.week}${wp.decharge?'<span style="position:absolute;top:-4px;right:-4px;font-size:8px">🔄</span>':wp.vacances?'<span style="position:absolute;top:-4px;right:-4px;font-size:8px">🏖️</span>':''}</button>`;

  h+=`<div style="display:flex;gap:5px;margin-bottom:14px">`;
  tmpl.forEach((d,i)=>{
    const hl=j[`w${ST.week}-d${i}`];
    h+=`<button class="dbtn" style="border-color:${ST.day===i?d.c:'#2D2D3F'}" onclick="selD(${i})">
      <div class="dlbl" style="color:${ST.day===i?d.c:'#6B7280'}">${d.day}</div>
      <div style="font-size:15px">${d.emoji}</div>
      ${hl?'<span class="ddot"></span>':''}
    </button>`;
  });
  h+=`</div>`;
  const day=tmpl[ST.day];
  const canLog=day.type==='salle'||day.type==='course'||day.type==='muscu';
  const logged=j[`w${ST.week}-d${ST.day}`];
  h+=`<div class="card" style="border-color:${day.c}40;margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:18px">${day.emoji}</span>
        <div><div style="font-weight:800;font-size:15px">${day.fullDay}</div>
        <span class="tag" style="background:${day.c}22;color:${day.c};border:1px solid ${day.c}40">${day.tag}</span></div>
      </div>
      ${canLog?`<button onclick="togJ()" style="padding:6px 10px;border-radius:8px;border:none;background:${logged?.done?'#10B98122':'#3B82F622'};color:${logged?.done?'#10B981':'#3B82F6'};font-size:11px;font-weight:700">${logged?.done?'✓ Noté':'📝 Journal'}</button>`:''}
    </div>`;
  if(day.note)h+=`<div class="${day.type==='muscu'?'cbox':'ybox'}">${day.note}</div>`;
  if(day.type==='salle'){
    h+=`<div style="padding:7px 10px;border-radius:8px;margin-bottom:10px;background:#1A2A1A;border:1px solid #10B98130;font-size:11px;color:#6EE7B7">🔥 Échauffement : 5 min vélo/tapis + 1 série légère à 50%</div>`;
    if(p.decharge)h+=`<div class="ybox">🔄 Décharge : charges −15%, 3 séries au lieu de 4</div>`;
    day.exercises.forEach(ex=>{
      const ld=LOAD(p,ex.name)||ex.load||'—';

    day.exercises.forEach(ex=>{
      h+=`<div class="exc"><div class="esvg">${SVG[ex.name]||'💪'}</div><div style="flex:1"><div class="enm">${ex.name}</div><div class="emu">${ex.muscles}</div></div><div class="elo"><div class="eset" style="color:${day.c}">${ex.sets}</div><div class="ekg">${ex.load}</div></div></div>`;

    h+=`<div style="padding:10px;background:#0F2B1F;border-radius:10px;border:1px solid #10B98140">

    h+=`<div style="text-align:center;padding:16px;font-size:28px">😴<div style="font-size:11px;color:#6B7280;margin-top:6px">Récupération — marche, étirements</div></div>`;
  }
  h+=`</div>`;
  if(ST.jshow&&canLog){
    const ex=j[`w${ST.week}-d${ST.day}`]||{};
    h+=`<div class="card" style="border-color:#3B82F640;margin-bottom:12px">
      <div style="font-weight:800;font-size:14px;margin-bottom:12px">📝 Journal — ${day.fullDay} S${ST.week}</div>`;
    day.exercises.forEach(exc=>{
      const sug=LOAD(p,exc.name)||exc.load||'—';
      h+=`<div style="margin-bottom:10px"><div style="font-size:11px;color:#9CA3AF;margin-bottom:4px">${exc.name} <span style="color:#4B5563">· ${sug}</span></div>
      <input class="jinp" value="${(ST.jinp[exc.name]||ex[exc.name]||'').replace(/"/g,'&quot;')}" placeholder="Charge réelle... ex: ${sug}" onchange="setJI('${exc.name}',this.value)"></div>`;
    });
    h+=`<div style="font-size:11px;color:#9CA3AF;margin-bottom:6px">Ressenti</div><div class="rrow">`;
    ['😴 Fatigué','😐 Normal','💪 En forme','🔥 Top'].forEach(r=>{
      h+=`<button class="rbtn ${(ST.jinp.ressenti||ex.ressenti)===r?'act':''}" onclick="setRes('${r}')">${r}</button>`;
    });
    h+=`</div><div style="font-size:11px;color:#9CA3AF;margin-bottom:4px">Notes libres</div>
    <textarea style="margin-bottom:12px;height:60px" placeholder="Douleurs, PR, remarques..." onchange="setJI('notes',this.value)">${ST.jinp.notes||ex.notes||''}</textarea>
    <div style="display:flex;gap:8px">
      <button class="btn-s" style="flex:1" onclick="ST.jshow=false;renderSem()">Annuler</button>
      <button style="flex:2;padding:11px;border-radius:10px;border:none;background:#3B82F6;color:#fff;font-size:13px;font-weight:700" onclick="saveJ()">Enregistrer ✓</button>
    </div></div>`;
  }
  h+=`<div class="card"><div class="slbl">Charges S${ST.week}${p.decharge?' 🔄':p.vacances?' 🏖️':''}</div>`;
  if(p.vacances){
    h+=`<div style="font-size:12px;color:#67E8F9;padding:10px;background:#0F2B2B;border-radius:9px">Pas de charges cette semaine — circuit poids du corps + Bréguières 🏔️</div>`;
  } else {
    [{n:"Squat",v:p.squat,m:80,c:"#3B82F6"},{n:"Roumain",v:p.rdl,m:90,c:"#10B981"},{n:"Développé",v:p.bench,m:80,c:"#EF4444"},{n:"Curl",v:p.curl,m:50,c:"#F59E0B"},{n:"Rowing",v:p.row,m:35,c:"#8B5CF6"},{n:"Leg curl",v:p.legCurl,m:50,c:"#06B6D4"},{n:"Tractions↓",v:p.tractions,m:40,c:"#EC4899",inv:true}].forEach(it=>{
      const pct=Math.min(it.inv?((40-it.v+25)/40)*100:(it.v/it.m)*100,100);
      h+=`<div class="pb-wrap"><div class="pb-lbl"><span style="font-size:10px;color:#9CA3AF">${it.n}</span><span style="font-size:10px;font-weight:700;color:${it.c}">${it.v} kg${it.inv?' ↓':''}</span></div><div class="pb-bg"><div class="pb-fill" style="width:${pct}%;background:${it.c}"></div></div></div>`;
    });
  }
  h+=`</div>`;
  document.getElementById('t-semaine').innerHTML=h;
}
function selW(w){ST.week=w;ST.day=0;ST.jshow=false;renderSem();}
function selD(d){ST.day=d;ST.jshow=false;renderSem();}
function togJ(){
  const j=S.get('journal')||{};
  const key='w'+ST.week+'-d'+ST.day;
  const existing=j[key]||{};
  ST.jinp={};
  Object.keys(existing).forEach(function(k){ ST.jinp[k]=existing[k]; });
  ST.jshow=!ST.jshow;
  renderSem();
}
function setJI(k,v){ST.jinp[k]=v;}
function setRes(r){ST.jinp.ressenti=r;renderSem();}
function saveJ(){const j=S.get('journal')||{};j[`w${ST.week}-d${ST.day}`]={...ST.jinp,done:true};S.set('journal',j);ST.jshow=false;renderSem();}

// ─── ÉCARTS ───────────────────────────────────────────────────────────────────

      ${ST.ecSel?.id===e.id?'<span style="color:#F59E0B;font-size:16px">✓</span>':''}

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">

        <div><div style="font-weight:800;font-size:15px">${e.lbl}</div><div style="font-size:10px;color:#F59E0B">${e.reel}</div></div>
      </div>
      <div style="display:flex;gap:7px;margin-bottom:12px">
        <div class="macbox" style="border:1px solid #F59E0B30"><div style="font-size:9px;color:#6B7280;margin-bottom:2px">Reste à manger</div><div style="font-size:18px;font-weight:800;color:#F59E0B">${reste}</div><div style="font-size:9px;color:#6B7280">kcal</div></div>
        <div class="macbox" style="border:1px solid #3B82F630"><div style="font-size:9px;color:#6B7280;margin-bottom:2px">Protéines à viser</div><div style="font-size:18px;font-weight:800;color:#3B82F6">${resteP}g</div><div style="font-size:9px;color:#6B7280">sur la journée</div></div>
      </div>
      <div style="font-size:12px;color:#D1D5DB;line-height:1.7;padding:12px;background:#14141F;border-radius:10px;margin-bottom:10px">${e.c}</div>
      ${e.repas?`<div style="padding:10px 12px;border-radius:9px;background:#1A2A1A;border:1px solid #10B98130;font-size:11px;color:#6EE7B7;line-height:1.6"><b>💡 Repas conseillés :</b> ${e.repas}</div>`:''}
      <div class="gbox">💚 Un écart isolé = zéro impact sur 10 semaines. Ce qui compte c'est la constance.</div>

}
function selEc(id){ST.ecSel=ECARTS.find(e=>e.id===id);ST.ecShow=false;renderEc();}

// ─── TRACKER ─────────────────────────────────────────────────────────────────
function renderTr(){
  const wl=S.get('wLog')||[];
  const il=S.get('iLog')||[];
  let h=`<div class="pill-row">`;
  [{k:'poids',l:'Poids',e:'⚖️'},{k:'impedance',l:'Impédance',e:'📊'},{k:'gras',l:'Perte gras',e:'🔥'}].forEach(t=>{
    h+=`<button class="pill ${ST.trTab===t.k?'act':''}" onclick="setTT('${t.k}')"><div class="pe">${t.e}</div><div class="pl">${t.l}</div></button>`;
  });
  h+=`</div>`;
  if(ST.trTab==='poids'){
    const last=wl.length?wl[wl.length-1]:null;
    const first=wl.length>1?wl[0]:null;
    const diff=last&&first?(last.p-first.p).toFixed(1):null;
    h+=`<div style="display:flex;gap:7px;margin-bottom:14px">
      <div class="sbox"><div style="font-size:9px;color:#6B7280;margin-bottom:3px">Poids actuel</div><div style="font-size:22px;font-weight:800">${last?last.p:'—'}<span style="font-size:12px;color:#6B7280"> kg</span></div></div>
      <div class="sbox"><div style="font-size:9px;color:#6B7280;margin-bottom:3px">Variation</div><div style="font-size:22px;font-weight:800;color:${diff===null?'#6B7280':parseFloat(diff)<0?'#10B981':'#EF4444'}">${diff!==null?(parseFloat(diff)<0?diff:'+'+diff):'—'}<span style="font-size:12px;color:#6B7280"> kg</span></div></div>
      <div class="sbox"><div style="font-size:9px;color:#6B7280;margin-bottom:3px">Objectif</div><div style="font-size:22px;font-weight:800;color:#3B82F6">−4<span style="font-size:12px;color:#6B7280"> kg</span></div></div>
    </div>`;
    if(wl.length>1){
      const cMax=Math.max(...wl.map(w=>w.p))+1,cMin=Math.min(...wl.map(w=>w.p))-1;
      const tgtY=last?((cMax-(last.p-4))/(cMax-cMin))*80+5:50;
      const pts=wl.map((w,i)=>{const x=(i/(wl.length-1))*290+5,y=((cMax-w.p)/(cMax-cMin))*80+5;return x+','+y;}).join(' ');
      h+=`<div class="card"><div class="slbl">Courbe de poids</div>
        <svg width="100%" height="100" viewBox="0 0 300 100">
          <line x1="0" y1="${tgtY}" x2="300" y2="${tgtY}" stroke="#10B98150" stroke-width="1" stroke-dasharray="4,3"/>
          <polyline points="${pts}" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          ${wl.map((w,i)=>{const x=(i/(wl.length-1))*290+5,y=((cMax-w.p)/(cMax-cMin))*80+5;return`<circle cx="${x}" cy="${y}" r="4" fill="#3B82F6" stroke="#0F0F1A" stroke-width="2"/>`;}).join('')}
        </svg>
        <div style="display:flex;justify-content:space-between;margin-top:4px">
          <span style="font-size:9px;color:#4B5563">${wl[0].d}</span><span style="font-size:9px;color:#10B981">— objectif −4 kg</span><span style="font-size:9px;color:#4B5563">${wl[wl.length-1].d}</span>
        </div></div>`;
    }
    h+=`<div class="card"><div class="slbl">Ajouter une mesure</div>
      <div style="display:flex;gap:8px;margin-bottom:8px"><input type="date" id="wd" style="flex:1"><input type="number" id="wv" placeholder="kg" step="0.1" style="width:70px"></div>
      <button class="btn-p" onclick="addW()">Ajouter ✓</button></div>`;
    if(wl.length){
      h+=`<div class="card"><div class="slbl">Historique</div>`;
      [...wl].reverse().slice(0,8).forEach(w=>{h+=`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #2D2D3F"><span style="font-size:11px;color:#9CA3AF">${w.d}</span><span style="font-size:12px;font-weight:700">${w.p} kg</span></div>`;});
      h+=`</div>`;
    }
    if(!wl.length){h+='<div class="gbox">💡 Commence le monitoring dès le lundi 22 juin — pèse-toi <b>lundi et vendredi matin</b>, à jeun, après les toilettes, toujours dans les mêmes conditions.</div>';}
  else {
    const today2 = new Date();
    const dow = today2.getDay(); // 0=dim, 1=lun, 5=ven
    if(dow===1||dow===5){
      h+='<div style="padding:9px 12px;border-radius:9px;background:#1E3A5F;border:1px solid #3B82F640;font-size:11px;color:#93C5FD;margin-bottom:10px">⚖️ <b>Rappel</b> — Aujourd\'hui c\'est jour de pesée ! Rentre ton poids ci-dessous.</div>';
    }
  }
  } else if(ST.trTab==='impedance'){
    const last=il.length?il[il.length-1]:null;
    if(last){
      h+=`<div class="card"><div class="slbl">Dernière mesure · ${last.d}</div><div class="igrid">`;
      const imc = last.p ? (86/(1.85*1.85)).toFixed(1) : (parseFloat(last.p)/(1.85*1.85)).toFixed(1);
      const imcCalc = last.p ? (parseFloat(last.p)/(1.85*1.85)).toFixed(1) : '—';
      [{l:"Masse grasse",v:last.mg,u:"%",c:"#EF4444",t:"10–20%"},{l:"Masse muscu",v:last.mm,u:"%",c:"#3B82F6",t:"40–50%"},{l:"Eau",v:last.eau,u:"%",c:"#06B6D4",t:"55–65%"},{l:"IMC (calculé)",v:imcCalc,u:"",c:"#8B5CF6",t:"< 25"},{l:"Poids",v:last.p,u:"kg",c:"#10B981",t:"82 kg"}].forEach(m=>{
        h+=`<div class="icell" style="border:1px solid ${m.c}30"><div class="ilbl">${m.l}</div><div class="ival" style="color:${m.c}">${m.v||'—'}<span style="font-size:9px">${m.u}</span></div><div class="itgt">Cible : ${m.t}</div></div>`;
      });
      h+=`</div></div>`;
    }
    h+=`<div class="card"><div style="font-size:11px;color:#F59E0B;font-weight:700;margin-bottom:10px">📖 Comment lire ta balance</div>`;
    [{l:"Masse grasse %",i:"10–20%",d:"> 25% = surpoids",c:"#EF4444",t:"Fond en premier avec déficit + course."},{l:"Masse musculaire %",i:"40–50%",d:"< 35% = masse maigre faible",c:"#3B82F6",t:"Doit rester stable. Si ça baisse → plus de protéines."},{l:"Hydratation %",i:"55–65%",d:"< 50% = déshydraté",c:"#06B6D4",t:"Mesure toujours à jeun le matin, sans sport la veille."},{l:"IMC",i:"18,5–25",d:"> 25 = surpoids",c:"#8B5CF6",t:"Calculé automatiquement depuis ton poids. Objectif : passer sous 25 (~85 kg)."}].forEach(it=>{
      h+=`<div style="margin-bottom:10px;padding:10px;background:#14141F;border-radius:9px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;font-weight:700;color:${it.c}">${it.l}</span><span style="font-size:10px;color:#10B981">${it.i}</span></div><div style="font-size:10px;color:#6B7280;margin-bottom:3px">${it.t}</div><div style="font-size:9px;color:#EF4444">⚠ ${it.d}</div></div>`;
    });
    h+=`</div>`;
    h+=`<div class="card"><div class="slbl">Ajouter une mesure</div>
      <div class="ybox">💡 Toujours le matin à jeun, après les toilettes, sans sport la veille.</div>
      <input type="date" id="id" style="margin-bottom:7px">
      <div class="igform">
        <div><div class="iflbl">Poids (kg)</div><input type="number" id="ip" step="0.1" placeholder="86.0" oninput="updateImcPreview()"></div>
        <div><div class="iflbl">IMC (auto)</div><div id="imc-preview" style="background:#14141F;border:1px solid #2D2D3F;border-radius:8px;color:#8B5CF6;padding:8px 10px;font-size:14px;font-weight:700;text-align:center">—</div></div>
        <div><div class="iflbl">Masse grasse (%)</div><input type="number" id="img" step="0.1" placeholder="18.0"></div>
        <div><div class="iflbl">Masse muscu (%)</div><input type="number" id="imm" step="0.1" placeholder="42.0"></div>
        <div style="grid-column:1/-1"><div class="iflbl">Eau (%)</div><input type="number" id="ie" step="0.1" placeholder="58.0"></div>
      </div>
      <button style="width:100%;padding:10px;border-radius:10px;border:none;background:#8B5CF6;color:#fff;font-size:12px;font-weight:700" onclick="addI()">Enregistrer la mesure ✓</button></div>`;
    if(il.length>1){
      const maxG=Math.max(...il.map(r=>parseFloat(r.mg)||0))+2,minG=Math.min(...il.map(r=>parseFloat(r.mg)||0))-2;
      const maxM=Math.max(...il.map(r=>parseFloat(r.mm)||0))+2,minM=Math.min(...il.map(r=>parseFloat(r.mm)||0))-2;
      const pG=il.map((r,i)=>{const x=(i/(il.length-1))*290+5,y=((maxG-(parseFloat(r.mg)||0))/(maxG-minG))*80+5;return x+','+y;}).join(' ');
      const pM=il.map((r,i)=>{const x=(i/(il.length-1))*290+5,y=((maxM-(parseFloat(r.mm)||0))/(maxM-minM))*80+5;return x+','+y;}).join(' ');
      h+=`<div class="card"><div class="slbl">Masse grasse vs musculaire</div>
        <svg width="100%" height="90" viewBox="0 0 300 90">
          <polyline points="${pG}" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="${pM}" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div style="display:flex;gap:12px;margin-top:6px"><span style="font-size:9px;color:#EF4444">● Masse grasse</span><span style="font-size:9px;color:#3B82F6">● Masse musculaire</span></div></div>`;
    }
    if(!il.length){h+=`<div class="gbox">💡 Commence la balance à impédance dès le 22 juin.</div>`;}
  } else {
    // PERTE DE GRAS
    const lastI=il.length?il[il.length-1]:null;
    const firstI=il.length>1?il[0]:null;
    const lastW=wl.length?wl[wl.length-1]:null;
    const firstW=wl.length>1?wl[0]:null;
    let grasDiff=null,muscDiff=null,poidsTotal=null;
    if(lastI&&firstI){
      const mgKgS=(parseFloat(firstI.mg)||0)/100*(parseFloat(firstI.p)||86);
      const mgKgE=(parseFloat(lastI.mg)||0)/100*(parseFloat(lastI.p)||86);
      grasDiff=(mgKgE-mgKgS).toFixed(1);
      const mmKgS=(parseFloat(firstI.mm)||0)/100*(parseFloat(firstI.p)||86);
      const mmKgE=(parseFloat(lastI.mm)||0)/100*(parseFloat(lastI.p)||86);
      muscDiff=(mmKgE-mmKgS).toFixed(1);
    }
    if(lastW&&firstW) poidsTotal=(lastW.p-firstW.p).toFixed(1);
    const grasPct=grasDiff?Math.min(Math.abs(parseFloat(grasDiff))/2*100,100):0;
    h+=`<div class="card">
      <div class="slbl">🔥 Indicateur perte de gras</div>
      <div style="text-align:center;margin-bottom:16px">
        <svg viewBox="0 0 120 120" width="120" height="120" style="display:block;margin:0 auto">
          <circle cx="60" cy="60" r="50" fill="none" stroke="#2D2D3F" stroke-width="12"/>
          <circle cx="60" cy="60" r="50" fill="none" stroke="url(#grad2)" stroke-width="12"
            stroke-dasharray="${grasPct*3.14}" stroke-dashoffset="78.5" stroke-linecap="round"
            transform="rotate(-90 60 60)"/>
          <defs><linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#10B981"/><stop offset="100%" style="stop-color:#EF4444"/>
          </linearGradient></defs>
          <text x="60" y="56" text-anchor="middle" fill="#F1F1F5" font-size="20" font-weight="900">${grasPct.toFixed(0)}%</text>
          <text x="60" y="70" text-anchor="middle" fill="#6B7280" font-size="9">objectif</text>
        </svg>
      </div>
      <div style="display:flex;gap:7px;margin-bottom:12px">
        <div class="sbox" style="border:1px solid #EF444430"><div style="font-size:9px;color:#6B7280;margin-bottom:3px">Gras perdu</div><div style="font-size:20px;font-weight:800;color:#EF4444">${grasDiff!==null?grasDiff:'—'}<span style="font-size:11px;color:#6B7280"> kg</span></div></div>
        <div class="sbox" style="border:1px solid #3B82F630"><div style="font-size:9px;color:#6B7280;margin-bottom:3px">Muscle gagné</div><div style="font-size:20px;font-weight:800;color:#3B82F6">${muscDiff!==null?(parseFloat(muscDiff)>=0?'+':'')+muscDiff:'—'}<span style="font-size:11px;color:#6B7280"> kg</span></div></div>
        <div class="sbox" style="border:1px solid #6B728030"><div style="font-size:9px;color:#6B7280;margin-bottom:3px">Poids total</div><div style="font-size:20px;font-weight:800;color:${poidsTotal===null?'#6B7280':parseFloat(poidsTotal)<0?'#10B981':'#EF4444'}">${poidsTotal!==null?(parseFloat(poidsTotal)<0?poidsTotal:'+'+poidsTotal):'—'}<span style="font-size:11px;color:#6B7280"> kg</span></div></div>
      </div>`;
    if(grasDiff!==null){
      h+=`<div style="padding:10px 12px;border-radius:9px;background:#14141F;font-size:11px;color:#D1D5DB;line-height:1.7">`;
      if(parseFloat(grasDiff)<0&&parseFloat(muscDiff||0)>=0) h+=`✅ <b style="color:#10B981">Recomposition en cours !</b> Tu perds du gras tout en maintenant ou gagnant du muscle. C'est exactement l'objectif.`;
      else if(parseFloat(grasDiff)<0) h+=`📉 Tu perds du gras — bonne trajectoire. Surveille que la masse musculaire ne baisse pas trop.`;
      else h+=`⏳ Continue — les premières semaines sont souvent silencieuses.`;
      h+=`</div>`;
    } else {
      h+=`<div class="gbox">💡 Commence tes mesures d'impédance le 22 juin pour voir l'évolution ici.</div>`;
    }
    h+=`</div>`;
    if(il.length>1){
      const maxG=Math.max(...il.map(r=>parseFloat(r.mg)||0))+2,minG=Math.min(...il.map(r=>parseFloat(r.mg)||0))-2;
      const pG=il.map((r,idx)=>{const x=(idx/(il.length-1))*290+5,y=((maxG-(parseFloat(r.mg)||0))/(maxG-minG))*70+5;return x+','+y;}).join(' ');
      h+=`<div class="card"><div class="slbl">Courbe masse grasse (%)</div>
        <svg width="100%" height="90" viewBox="0 0 300 90">
          <polyline points="${pG}" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          ${il.map((r,idx)=>{const x=(idx/(il.length-1))*290+5,y=((maxG-(parseFloat(r.mg)||0))/(maxG-minG))*70+5;return`<circle cx="${x}" cy="${y}" r="4" fill="#EF4444" stroke="#0F0F1A" stroke-width="2"/><text x="${x}" y="${y-8}" fill="#9CA3AF" font-size="8" text-anchor="middle">${r.mg}%</text>`;}).join('')}
        </svg>
        <div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:9px;color:#4B5563">${il[0].d}</span><span style="font-size:9px;color:#EF4444">● Masse grasse</span><span style="font-size:9px;color:#4B5563">${il[il.length-1].d}</span></div>
      </div>`;
    }
  }
  document.getElementById('t-tracker').innerHTML=h;
}
function setTT(t){ST.trTab=t;renderTr();}
function addW(){
  const d=document.getElementById('wd').value,v=parseFloat(document.getElementById('wv').value);
  if(!d||isNaN(v))return;
  const l=S.get('wLog')||[];l.push({d,p:v});l.sort((a,b)=>a.d.localeCompare(b.d));S.set('wLog',l);renderTr();
}
function addI(){
  const d=document.getElementById('id').value;if(!d)return;
  const poids=parseFloat(document.getElementById('ip').value)||0;
  const imc = poids>0 ? (poids/(1.85*1.85)).toFixed(1) : '—';
  const entry={d,p:poids,imc:imc,mg:document.getElementById('img').value,mm:document.getElementById('imm').value,eau:document.getElementById('ie').value};
  const l=S.get('iLog')||[];l.push(entry);l.sort((a,b)=>a.d.localeCompare(b.d));S.set('iLog',l);renderTr();
}

function updateImcPreview(){
  const p=parseFloat(document.getElementById('ip')?.value)||0;
  const el=document.getElementById('imc-preview');
  if(el) el.textContent = p>0 ? (p/(1.85*1.85)).toFixed(1) : '—';
}

// ─── EXERCICES ───────────────────────────────────────────────────────────────
function renderEx(){
  let h='<div style="display:flex;gap:7px;margin-bottom:14px">';
  [{k:'A',l:'Séance A',s:'Bas + Tirage',c:'#3B82F6'},{k:'B',l:'Séance B',s:'Haut + Poussée',c:'#EF4444'},{k:'V',l:'Vacances',s:'Poids corps',c:'#10B981'}].forEach(function(t){
    h+='<button onclick="setET(\''+t.k+'\')" style="flex:1;padding:9px 4px;border-radius:11px;border:1.5px solid '+(ST.exTab===t.k?t.c:'#2D2D3F')+';background:'+(ST.exTab===t.k?t.c+'22':'#1E1E2E')+';text-align:center"><div style="font-size:11px;font-weight:700;color:'+(ST.exTab===t.k?t.c:'#9CA3AF')+'">'+t.l+'</div><div style="font-size:9px;color:#6B7280">'+t.s+'</div></button>';
  });
  h+='</div>';

  SEANCES[ST.exTab].forEach(function(ex, gi){
    const open = ST.exOpen===gi;
    const svgIcon = SVG[ex.name]||'<span style="font-size:24px">💪</span>';
    h+='<div style="margin-bottom:10px">';
    h+='<div class="exk '+(open?'open':'')+'" style="--ec:'+ex.c+'" onclick="togEx('+gi+')">';
    h+='<div style="display:flex;align-items:center;gap:10px">';
    h+='<div style="background:#14141F;border-radius:7px;padding:5px;min-width:48px;display:flex;justify-content:center">'+svgIcon+'</div>';
    h+='<div style="flex:1">';
    h+='<div style="font-weight:700;font-size:12px;color:#F1F1F5">'+ex.name+'</div>';
    h+='<div style="font-size:9px;color:#6B7280">'+ex.muscles+'</div>';
    h+='</div>';
    h+='<div style="text-align:right">';
    h+='<div style="font-size:11px;font-weight:700;color:'+ex.c+'">'+ex.sets+'</div>';
    h+='<div style="font-size:10px;color:#9CA3AF">'+ex.load+'</div>';
    h+='</div></div>';
    if(open){
      h+='<div class="edesc">'+ex.desc+'</div>';
    }
    h+='</div>';

    h+='<span style="font-size:9px;color:#4B5563">⏱ Repos après chaque série :</span>';
    h+='<span style="font-size:10px;font-weight:700;color:'+ex.c+'">'+ex.rest+'</span>';

function setET(t){ST.exTab=t;ST.exOpen=null;renderEx();}
function togEx(k){ST.exOpen=(ST.exOpen===k?null:k);renderEx();}

// ─── JOURNAL ─────────────────────────────────────────────────────────────────
function renderJournal(){
  const journal = S.get('nutJournal') || {};
  const days = Object.values(journal).sort((a,b)=>b.date.localeCompare(a.date));

  let h = `<div style="font-size:13px;color:#9CA3AF;margin-bottom:14px;line-height:1.5">
    Historique de tes journées alimentaires. Enregistre chaque soir depuis l'onglet Nutrition.
  </div>`;

  if(days.length === 0){
    h += `<div class="gbox">💡 Aucune journée enregistrée pour l'instant. Va dans l'onglet Nutrition, saisis tes repas et appuie sur 💾 Enregistrer.</div>`;
    document.getElementById('t-journal').innerHTML = h;
    return;
  }

  // Résumé hebdo si assez de données
  if(days.length >= 3){
    const last7 = days.slice(0,7);
    const avgK = Math.round(last7.reduce(function(s,d){return s+d.totalK;},0)/last7.length);
    const avgP = Math.round(last7.reduce(function(s,d){return s+d.totalP;},0)/last7.length);
    const avgKColor = avgK>2400?'#EF4444':'#10B981';
    const avgPColor = avgP<165?'#F59E0B':'#10B981';
    const avgKTxt = avgK>2400?"⚠ au-dessus":"✓ objectif ok";
    const avgPTxt = avgP<165?'↗ vise 165g':'✓ objectif atteint';
    h += '<div class="card" style="margin-bottom:12px">';
    h += '<div class="slbl">📊 Moyenne (' + last7.length + ' derniers jours)</div>';
    h += '<div style="display:flex;gap:7px">';
    h += '<div class="sbox"><div style="font-size:9px;color:#6B7280;margin-bottom:3px">Calories moy.</div>';
    h += '<div style="font-size:20px;font-weight:800;color:#F59E0B">' + avgK + '<span style="font-size:11px;color:#6B7280"> kcal</span></div>';
    h += '<div style="font-size:9px;color:' + avgKColor + '">' + avgKTxt + '</div></div>';
    h += '<div class="sbox"><div style="font-size:9px;color:#6B7280;margin-bottom:3px">Protéines moy.</div>';
    h += '<div style="font-size:20px;font-weight:800;color:#3B82F6">' + avgP + 'g</div>';
    h += '<div style="font-size:9px;color:' + avgPColor + '">' + avgPTxt + '</div></div>';
    h += '</div></div>';
  }

  // Rappel dimanche 22h
  const now = new Date();
  const isSunday = now.getDay() === 0;
  const isEvening = now.getHours() >= 20;
  if(isSunday && isEvening){
    h += `<div class="ybox">📋 Dimanche soir — récap de ta semaine ci-dessous !</div>`;
  }

  // Liste des journées
  days.forEach(function(day){
    const date = new Date(day.date);
    const dateStr = date.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
    const kPct = Math.min((day.totalK/2400)*100,100);
    const pPct = Math.min((day.totalP/165)*100,100);
    const kColor = day.totalK > 2500 ? '#EF4444' : day.totalK < 2000 ? '#F59E0B' : '#10B981';
    const pColor = day.totalP < 140 ? '#F59E0B' : '#10B981';
    const mealsDetail = renderDayMeals(day);

    h += '<div class="card">';
    h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">';
    h += '<div>';
    h += '<div style="font-weight:800;font-size:14px;color:#F1F1F5;text-transform:capitalize">' + dateStr + '</div>';
    h += '<div style="font-size:10px;color:#6B7280">Enregistré à ' + (day.savedAt||'—') + '</div>';
    h += '</div>';
    h += '<div style="display:flex;gap:6px">';
    h += '<button data-date="' + day.date + '" onclick="loadDayBtn(this)" style="padding:5px 8px;border-radius:7px;border:none;background:#1E3A5F;color:#93C5FD;font-size:10px;font-weight:700">Recharger</button>';
    h += '<button data-date="' + day.date + '" onclick="deleteDayBtn(this)" style="padding:5px 8px;border-radius:7px;border:none;background:#3A1A1A;color:#EF4444;font-size:10px;font-weight:700">✕</button>';
    h += '</div></div>';
    h += '<div style="display:flex;gap:7px;margin-bottom:10px">';
    h += '<div style="flex:1;background:#14141F;border-radius:9px;padding:9px;border:1px solid ' + kColor + '30">';
    h += '<div style="font-size:9px;color:#6B7280;margin-bottom:2px">Calories</div>';
    h += '<div style="font-size:18px;font-weight:800;color:' + kColor + '">' + day.totalK + '</div>';
    h += '<div class="pb-bg" style="margin-top:4px"><div class="pb-fill" style="width:' + kPct + '%;background:' + kColor + '"></div></div>';
    h += '</div>';
    h += '<div style="flex:1;background:#14141F;border-radius:9px;padding:9px;border:1px solid ' + pColor + '30">';
    h += '<div style="font-size:9px;color:#6B7280;margin-bottom:2px">Protéines</div>';
    h += '<div style="font-size:18px;font-weight:800;color:' + pColor + '">' + day.totalP + 'g</div>';
    h += '<div class="pb-bg" style="margin-top:4px"><div class="pb-fill" style="width:' + pPct + '%;background:' + pColor + '"></div></div>';
    h += '</div></div>';
    h += mealsDetail;
    h += '</div>';
  });

  document.getElementById('t-journal').innerHTML = h;
}

function renderDayMeals(day){
  if(!day.selections) return '';
  const slots = {pdj:'☀️ Petit déj', dej:'🍽️ Déjeuner', gouter:'🍎 Goûter', snack:'💪 Snack', diner:'🌙 Dîner'};
  let h = '<div style="border-top:1px solid #2D2D3F;padding-top:8px">';
  let hasAny = false;
  Object.entries(slots).forEach(function(entry){
    const id = entry[0], lbl = entry[1];
    const sel = day.selections[id]||{};
    const manual = (day.manual||{})[id]||[];
    const items = [];
    Object.entries(sel).forEach(function(e){ items.push({n:e[0],q:e[1]}); });
    manual.forEach(function(m){ items.push({n:m.n,q:m.qty}); });
    if(items.length === 0) return;
    hasAny = true;
    let itemsHtml = '';
    items.forEach(function(i){
      const a = ALIMENTS[i.n];
      const m = calcMacros(i.n, i.q);
      if(itemsHtml) itemsHtml += ' · ';
      itemsHtml += (a&&a.emoji?a.emoji:'🍽️') + ' ' + i.n + ' ' + i.q + 'g <span style="color:#4B5563">(' + m.k + 'kcal)</span>';
    });
    h += '<div style="margin-bottom:6px">';
    h += '<div style="font-size:10px;font-weight:700;color:#9CA3AF;margin-bottom:3px">' + lbl + '</div>';
    h += '<div style="font-size:11px;color:#6B7280;line-height:1.6">' + itemsHtml + '</div>';
    h += '</div>';
  });
  h += '</div>';
  return hasAny ? h : '';
}

function loadDay(date){
  ST.nutDate = date;
  const saved = (S.get('nutJournal')||{})[date];
  if(saved){
    ST.nutSelections = JSON.parse(JSON.stringify(saved.selections||{}));
    ST.nutManual = JSON.parse(JSON.stringify(saved.manual||{}));
  }
  nav('nutrition', document.querySelector('.nbtn:nth-child(2)'));
}

function loadDayBtn(btn){ loadDay(btn.getAttribute('data-date')); }

function deleteDay(date){
  const journal = S.get('nutJournal')||{};
  delete journal[date];
  S.set('nutJournal', journal);
  renderJournal();
}

function deleteDayBtn(btn){ deleteDay(btn.getAttribute('data-date')); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
function render(t){
  if(t==='semaine')renderSem();
  else if(t==='nutrition')renderNut();
  else if(t==='journal')renderJournal();
  else if(t==='ecarts')renderEc();
  else if(t==='tracker')renderTr();
  else if(t==='exercices')renderEx();
}

// Auto-load today's nutrition data on startup
(function initNutrition(){
  const today = new Date().toISOString().split('T')[0];
  ST.nutDate = today;
  const saved = (S.get('nutJournal')||{})[today];
  if(saved && saved.selections){
    ST.nutSelections = JSON.parse(JSON.stringify(saved.selections));
    ST.nutManual = JSON.parse(JSON.stringify(saved.manual||{}));
  }
  // Purge entries older than 7 days
  const journal = S.get('nutJournal')||{};
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate()-7);
  const cutoffStr = cutoff.toISOString().split('T')[0];
  let purged = false;
  Object.keys(journal).forEach(function(d){
    if(d < cutoffStr){ delete journal[d]; purged=true; }
  });
  if(purged) S.set('nutJournal', journal);
})();

renderSem();
</script>
