<title>Mon Programme 💪</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0F0F1A;color:#F1F1F5;font-family:-apple-system,system-ui,sans-serif;padding-bottom:80px;min-height:100vh}
button,input,textarea,select{font-family:inherit;cursor:pointer;outline:none}
input[type=date],select{color-scheme:dark}
.hdr{background:linear-gradient(135deg,#1A1A2E,#16213E);padding:52px 20px 14px;border-bottom:1px solid #2D2D3F}
.hdr-sub{font-size:9px;color:#6B7280;letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px}
.hdr h1{font-size:20px;font-weight:900;letter-spacing:-.02em}
.hdr-desc{font-size:11px;color:#6B7280;margin-top:3px}
.content{padding:14px 16px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#0F0F1A;border-top:1px solid #2D2D3F;display:flex;padding:6px 8px env(safe-area-inset-bottom,14px)}
.nbtn{flex:1;border:none;background:transparent;padding:6px 2px;display:flex;flex-direction:column;align-items:center;gap:2px}
.nem{font-size:18px;opacity:.35}
.nlb{font-size:9px;font-weight:700;color:#6B7280}
.nbtn.act .nem{opacity:1}.nbtn.act .nlb{color:#3B82F6}
.tab{display:none}.tab.act{display:block}
.card{background:#1E1E2E;border-radius:14px;padding:14px;border:1px solid #2D2D3F;margin-bottom:12px}
.slbl{font-size:10px;color:#6B7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-block}
.pill-row{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.pill{flex:1;min-width:60px;padding:10px 4px;border-radius:11px;border:1.5px solid #2D2D3F;background:#1E1E2E;text-align:center}
.pill.act{border-color:#3B82F6;background:#1E3A5F}
.pill .pe{font-size:16px;margin-bottom:2px}
.pill .pl{font-size:10px;font-weight:700;color:#6B7280}
.pill.act .pl{color:#93C5FD}
.wbtn{width:34px;height:34px;border-radius:9px;border:none;font-weight:700;font-size:12px;background:#1E1E2E;color:#6B7280;position:relative}
.wbtn.act{background:#3B82F6;color:#fff}
.wbtn.decharge{border:1.5px solid #F59E0B!important;color:#F59E0B}
.wbtn.vacances{border:1.5px solid #06B6D4!important;color:#06B6D4}
.wbtn.vacances.act{background:#06B6D4;color:#fff}
.fbadge{margin-top:10px;padding:8px 12px;border-radius:10px;background:#1E3A5F;border:1px solid #3B82F640;font-size:12px;color:#93C5FD}
.fbadge.db{background:#2D1F00;border-color:#F59E0B40;color:#FCD34D}
.fbadge.vb{background:#0F2B2B;border-color:#06B6D440;color:#67E8F9}
.dbtn{flex:1;padding:7px 3px;border-radius:9px;border:1.5px solid #2D2D3F;background:transparent;position:relative}
.dlbl{font-size:8px;font-weight:700;color:#6B7280;margin-bottom:3px}
.ddot{position:absolute;top:2px;right:2px;width:6px;height:6px;border-radius:50%;background:#10B981}
.exc{display:flex;align-items:center;gap:10px;padding:9px;background:#14141F;border-radius:9px;margin-bottom:7px}
.esvg{min-width:44px;display:flex;justify-content:center}
.enm{font-size:12px;font-weight:700;color:#F1F1F5}
.emu{font-size:10px;color:#6B7280}
.elo{text-align:right}
.eset{font-size:11px;font-weight:700}
.ekg{font-size:10px;color:#9CA3AF}
.pb-wrap{margin-bottom:7px}
.pb-lbl{display:flex;justify-content:space-between;margin-bottom:3px}
.pb-bg{height:3px;background:#2D2D3F;border-radius:2px}
.pb-fill{height:100%;border-radius:2px;transition:width .4s}
.btn-p{width:100%;padding:11px;border-radius:10px;border:none;background:#3B82F6;color:#fff;font-size:13px;font-weight:700}
.btn-g{width:100%;padding:11px;border-radius:10px;border:none;background:#10B981;color:#fff;font-size:13px;font-weight:700}
.btn-s{width:100%;padding:11px;border-radius:10px;border:1px solid #2D2D3F;background:transparent;color:#6B7280;font-size:13px}

.jinp{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #2D2D3F;background:#14141F;color:#F1F1F5;font-size:12px}
.rrow{display:flex;gap:6px;margin-bottom:10px}
.rbtn{flex:1;padding:6px 4px;border-radius:8px;border:1px solid #2D2D3F;background:#14141F;color:#6B7280;font-size:10px;font-weight:600}
.rbtn.act{border-color:#3B82F6;background:#1E3A5F;color:#93C5FD}
.meal-card{background:#1E1E2E;border-radius:13px;border:1px solid #2D2D3F;overflow:hidden;margin-bottom:9px}
.meal-hdr{padding:13px;display:flex;align-items:center;gap:10px}
.meal-body{border-top:1px solid #2D2D3F;padding:12px}
.macbox{flex:1;background:#1E1E2E;border-radius:11px;padding:11px}
.mval{font-size:18px;font-weight:800}
.ebtn{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border:1.5px solid #2D2D3F;background:#1E1E2E;text-align:left;width:100%;margin-bottom:8px}
.ebtn.sel{border-color:#F59E0B;background:#2D1F00}
.sbox{flex:1;background:#1E1E2E;border-radius:11px;padding:12px}
.igrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.icell{background:#14141F;border-radius:10px;padding:10px}
.ival{font-size:16px;font-weight:800}
.ilbl{font-size:9px;color:#6B7280;margin-bottom:3px;line-height:1.2}
.itgt{font-size:8px;color:#4B5563;margin-top:2px}
.igform{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.iflbl{font-size:9px;color:#6B7280;margin-bottom:3px}
input[type=number],input[type=date],input[type=text]{background:#14141F;border:1px solid #2D2D3F;border-radius:8px;color:#F1F1F5;padding:8px 10px;font-size:12px;width:100%}
select{background:#14141F;border:1px solid #2D2D3F;border-radius:8px;color:#F1F1F5;padding:8px 10px;font-size:12px;width:100%}
textarea{background:#14141F;border:1px solid #2D2D3F;border-radius:8px;color:#F1F1F5;padding:8px 10px;font-size:12px;width:100%;resize:none}
.ssup{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:3px 11px;margin-bottom:9px;border:1.5px solid}
.exk{background:#1E1E2E;border-radius:11px;padding:11px;border:1px solid #2D2D3F;margin-bottom:7px}
.exk.open{border-color:var(--ec)}
.edesc{margin-top:9px;padding-top:9px;border-top:1px solid #2D2D3F;font-size:11px;color:#A1A1B5;line-height:1.6}

.food-item{display:flex;align-items:center;gap:8px;padding:8px;background:#14141F;border-radius:9px;margin-bottom:6px;border:1px solid #2D2D3F}
.food-item.selected{border-color:#10B981;background:#0F2B1F}
.food-check{width:20px;height:20px;border-radius:6px;border:1.5px solid #374151;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px}
.food-item.selected .food-check{background:#10B981;border-color:#10B981}
.food-name{flex:1;font-size:12px;color:#F1F1F5}
.food-macros{font-size:10px;color:#6B7280;text-align:right}
.food-qty{width:55px;padding:4px 6px;border-radius:6px;border:1px solid #374151;background:#1E1E2E;color:#F1F1F5;font-size:11px;text-align:center}
.macro-summary{display:flex;gap:6px;margin:12px 0;padding:10px;background:#14141F;border-radius:10px}
.ms-item{flex:1;text-align:center}
.ms-val{font-size:16px;font-weight:800}
.ms-lbl{font-size:9px;color:#6B7280}
.reco-card{background:#0F2B1F;border:1px solid #10B98140;border-radius:12px;padding:12px;margin-top:10px}
.reco-item{padding:8px 0;border-bottom:1px solid #1A3A2A;font-size:12px;color:#D1FAE5;line-height:1.5}
.reco-item:last-child{border-bottom:none}
.day-total-bar{height:8px;border-radius:4px;background:#2D2D3F;overflow:hidden;margin:4px 0}
.day-total-fill{height:100%;border-radius:4px;transition:width .5s}

</head>

// ─── DATE PARIS ───────────────────────────────────────────────────────────────
function parisDateStr(){
  return new Date().toLocaleDateString('fr-CA',{timeZone:'Europe/Paris'});
  // fr-CA retourne le format YYYY-MM-DD, identique a toISOString mais en heure Paris
}
function parisHour(){
  return parseInt(new Date().toLocaleString('fr-FR',{timeZone:'Europe/Paris',hour:'2-digit',hour12:false}),10);
}
function parisDay(){
  // 0=dimanche, 1=lundi ... 6=samedi — identique a getDay() mais en heure Paris
  var days = ['dim','lun','mar','mer','jeu','ven','sam'];
  var dayStr = new Date().toLocaleDateString('fr-FR',{timeZone:'Europe/Paris',weekday:'short'});
  var idx = days.indexOf(dayStr.toLowerCase().replace('.',''));
  return idx >= 0 ? idx : new Date().getDay();
}

function calcMacros(name, qty){
  const a = ALIMENTS[name];
  if(!a) return {k:0,p:0,g:0,l:0};
  return {
    k: Math.round(a.k * qty / 100),
    p: Math.round(a.p * qty / 100 * 10) / 10,
    g: Math.round(a.g * qty / 100 * 10) / 10,
    l: Math.round(a.l * qty / 100 * 10) / 10,
  };
}

function getSlotTotals(slotId){
  const sel = ST.nutSelections[slotId] || {};
  const manual = ST.nutManual[slotId] || [];
  let tk=0, tp=0;
  Object.entries(sel).forEach(([name, qty])=>{
    const m = calcMacros(name, qty);
    tk += m.k; tp += m.p;
  });
  manual.forEach(mi=>{
    const m = calcMacros(mi.n, mi.qty);
    tk += m.k; tp += m.p;
  });
  return {k: Math.round(tk), p: Math.round(tp*10)/10};
}

function getDayTotals(){
  let tk=0, tp=0;
  ['pdj','dej','gouter','snack','diner'].forEach(s=>{
    const t = getSlotTotals(s);
    tk += t.k; tp += t.p;
  });
  return {k: Math.round(tk), p: Math.round(tp*10)/10};
}

function genReco(slotId, variant){
  // variant: 'poisson' | 'viande' | 'vegetal'
  variant = variant || 'poisson';
  // Calcule ce qui reste à manger après ce slot
  const slots = ['pdj','dej','gouter','snack','diner'];
  const idx = slots.indexOf(slotId);
  // Totaux déjà mangés (slots précédents + ce slot)
  let doneK=0, doneP=0;
  for(let i=0; i<=idx; i++){
    const t = getSlotTotals(slots[i]);
    doneK += t.k; doneP += t.p;
  }
  const resteK = Math.max(0, getTargetKcal() - doneK);
  const resteP = Math.max(0, TARGET_PROT - doneP);
  const nextSlots = slots.slice(idx+1);

  // Génère suggestions pour chaque slot restant
  const recos = {};
  if(nextSlots.length === 0) return {resteK, resteP, nextSlots, recos, variant};

  const kPerSlot = Math.round(resteK / nextSlots.length);
  const pPerSlot = Math.round(resteP / nextSlots.length);

  // Templates par slot, déclinés en 3 variantes
  const templatesByVariant = {
    poisson: {

    },

function fmtDuree(min){
  if(min <= 0) return '0 min';
  var h = Math.floor(min / 60);
  var m = min % 60;
  if(h === 0) return m + 'min';
  if(m === 0) return h + 'h';
  return h + 'h' + (m < 10 ? '0' : '') + m;
}

function calcJeuneInfo(){
  if(!ST.jeuneActif || !ST.jeuneDebut || !ST.jeuneFin) return {enCours:false, dureeMin:0, restantMin:0, pct:0, ecoulMin:0, termine:false};
  var now = new Date();
  var startDate = ST.jeuneDate || parisDateStr();
  var debut = new Date(startDate + 'T' + ST.jeuneDebut + ':00');
  var fin = new Date(startDate + 'T' + ST.jeuneFin + ':00');
  if(fin <= debut) fin.setDate(fin.getDate() + 1);
  var dureeMin = Math.round((fin - debut) / 60000);
  var ecoulMin = Math.round((now - debut) / 60000);
  var restantMin = Math.max(0, Math.round((fin - now) / 60000));
  var pct = Math.min(Math.max((ecoulMin / dureeMin) * 100, 0), 100);
  var enCours = now >= debut && now < fin;
  var termine = now >= fin;
  return {enCours, termine, dureeMin, ecoulMin, restantMin, pct, debut, fin};
}

async function fetchJeuneHoraires(){
  var jeuneId = ST.jeuneSelected;
  if(!jeuneId){ ST.jeuneError = "Sélectionne d'abord un jeûne."; renderJeunePage(); return; }
  var ville = (ST.jeuneVille||'Paris').trim();
  var jeune = JEUNES_HEBRAIQUES.find(function(j){ return j.id === jeuneId; });
  if(!jeune){ ST.jeuneError = "Jeûne introuvable."; renderJeunePage(); return; }

  // Date la plus proche dans le futur
  var now = parisDateStr();
  var dateJeune = (jeune.date_2025 && jeune.date_2025 >= now) ? jeune.date_2025 : (jeune.date_2026 || jeune.date_2025);

  ST.jeuneLoading = true; ST.jeuneError = null; ST.jeuneHoraires = null;
  ST.jeuneDebutOverride = ''; ST.jeuneFinOverride = '';
  renderJeunePage();

  var dateFr = dateJeune ? new Date(dateJeune+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}) : 'date inconnue';
  var prompt = "Je cherche les horaires precis du coucher du soleil et de la nuit tombee (tzet hakochavim, 3 etoiles visibles) pour le jeune juif \""+jeune.nom+"\" le "+dateFr+" a "+ville+". "
    + "Ce jeune commence au coucher du soleil (pour les jeunes de 25h) ou a l aube/alba (pour les jeunes de jour). Il se termine a la nuit tombee (apparition des etoiles). "
    + "Recherche les horaires solaires precis pour "+ville+" a cette date. "
    + "Reponds UNIQUEMENT en JSON valide sans markdown : "
    + '{"ville":"'+ville+'","date":"'+dateFr+'","debut":"HH:MM","debut_label":"ex: coucher du soleil / aube","fin":"HH:MM","fin_label":"ex: nuit tombee / 3 etoiles visibles","duree_heures": nombre,"note":"info utile en 1 phrase si necessaire"}';

  try{
    var resp = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-6", max_tokens:600,
        tools:[{type:"web_search_20250305",name:"web_search"}],
        messages:[{role:"user",content:prompt}]
      })
    });
    var data = await resp.json();
    var txt = (data.content||[]).map(function(b){return b.type==='text'?b.text:'';}).filter(Boolean).join('\n');
    var clean = txt.replace(/```json|```/g,'').trim();
    var f = clean.indexOf('{'), l = clean.lastIndexOf('}');
    if(f>=0 && l>f) clean = clean.slice(f,l+1);
    var parsed = JSON.parse(clean);
    ST.jeuneHoraires = parsed;
    ST.jeuneError = null;
    // Pré-remplir les overrides avec les valeurs trouvées
    ST.jeuneDebutOverride = parsed.debut || '';
    ST.jeuneFinOverride = parsed.fin || '';
    // Stocker le nom du jeûne et la date sélectionnée
    ST.jeuneSelectedNom = jeune.nom;
    ST.jeuneSelectedDate = dateJeune;
  }catch(e){
    ST.jeuneError = "Impossible de récupérer les horaires. Vérifie ta connexion et réessaie.";
    ST.jeuneHoraires = null;
  }
  ST.jeuneLoading = false;
  renderJeunePage();
}

function activerJeune(){
  var hr = ST.jeuneHoraires;
  if(!hr) return;
  ST.jeuneActif = true;
  ST.jeuneNom = ST.jeuneSelectedNom || hr.nom || 'Jeûne';
  ST.jeuneDebut = ST.jeuneDebutOverride || hr.debut || '';
  ST.jeuneFin = ST.jeuneFinOverride || hr.fin || '';
  ST.jeuneDate = ST.jeuneSelectedDate || parisDateStr();
  S.set('jeuneState', JSON.stringify({
    jeuneActif:true, jeuneNom:ST.jeuneNom,
    jeuneDebut:ST.jeuneDebut, jeuneFin:ST.jeuneFin, jeuneDate:ST.jeuneDate
  }));
  renderJeunePage();
}

function setNutSlot(s){ ST.nutSlot=s; ST.nutShowReco=null; renderNut(); }

function openJeunePage(){
  // Cache tous les tabs, affiche t-jeune
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('act'));
  document.querySelectorAll('.nbtn').forEach(x=>x.classList.remove('act'));
  document.getElementById('t-jeune').classList.add('act');
  ST._activeTab = 'jeune';
  window.scrollTo(0,0);
  renderJeunePage();
}

function setNutDate(d){
  ST.nutDate = d;
  // Load saved data for this date if exists
  const saved = (S.get('nutJournal')||{})[d];
  if(saved && saved.selections){
    ST.nutSelections = JSON.parse(JSON.stringify(saved.selections));
    ST.nutManual = JSON.parse(JSON.stringify(saved.manual||{}));
  } else {
    ST.nutSelections = {};
    ST.nutManual = {};
  }
  renderNut();
}

function saveDay(){
  const date = ST.nutDate || parisDateStr();
  const dayT = getDayTotals();
  const journal = S.get('nutJournal') || {};
  journal[date] = {
    date,
    selections: JSON.parse(JSON.stringify(ST.nutSelections)),
    manual: JSON.parse(JSON.stringify(ST.nutManual||{})),
    totalK: dayT.k,
    totalP: dayT.p,
    savedAt: new Date().toLocaleTimeString('fr-FR')
  };
  S.set('nutJournal', journal);
  renderNut();
  // Petit flash de confirmation
  const btn = document.querySelector('#t-nutrition button[onclick="saveDay()"]');
  if(btn){ btn.textContent = '✓ Sauvegardé !'; setTimeout(()=>{ btn.textContent = '💾 Enregistrer'; }, 2000); }
}

function togFood(slot, name, defaultQty){
  if(!ST.nutSelections[slot]) ST.nutSelections[slot]={};
  if(ST.nutSelections[slot].hasOwnProperty(name)){
    delete ST.nutSelections[slot][name];
  } else {
    ST.nutSelections[slot][name] = defaultQty;
  }
  ST.nutShowReco=null;
  renderNut();
}

function updateQty(slot, name, val){
  if(!ST.nutSelections[slot]) ST.nutSelections[slot]={};
  ST.nutSelections[slot][name] = parseFloat(val)||0;
  renderNut();
}

function addFreeItem(slot){
  const sel = document.getElementById('free-select');
  const qty = parseFloat(document.getElementById('free-qty').value);
  if(!sel.value || !qty || qty<=0) return;
  if(!ST.nutManual[slot]) ST.nutManual[slot]=[];
  ST.nutManual[slot].push({n:sel.value, qty:qty});
  ST.nutShowReco=null;
  renderNut();
}

function updateManualQty(slot, idx, val){
  if(!ST.nutManual[slot]) return;
  ST.nutManual[slot][idx].qty = parseFloat(val)||0;
  renderNut();
}

function removeManual(slot, idx){
  if(!ST.nutManual[slot]) return;
  ST.nutManual[slot].splice(idx,1);
  renderNut();
}

function showReco(slot, variant){ ST.nutShowReco=slot; ST.nutRecoVariant=variant||'poisson'; renderNut(); }
function showRecoBtn(btn){ showReco(btn.getAttribute('data-slot'), btn.getAttribute('data-variant')); }

function addCustomItem(slot){
  var name = document.getElementById('custom-name').value.trim();
  var kcal = parseFloat(document.getElementById('custom-kcal').value);
  var prot = parseFloat(document.getElementById('custom-prot').value)||0;
  var gluc = parseFloat(document.getElementById('custom-gluc').value)||0;
  var lip  = parseFloat(document.getElementById('custom-lip').value)||0;
  if(!name || isNaN(kcal)) return;
  // Add to ALIMENTS dynamically
  ALIMENTS[name] = {k:kcal, p:prot, g:gluc, l:lip, emoji:'🍽️', cat:'Mes aliments'};
  // Save to localStorage permanently
  var custom = S.get('customAliments') || {};
  custom[name] = {k:kcal, p:prot, g:gluc, l:lip};
  S.set('customAliments', custom);
  // Add cat to list if needed
  if(ALIMENT_CATS.indexOf('Mes aliments') < 0) ALIMENT_CATS.push('Mes aliments');
  // Add to current slot
  if(!ST.nutManual[slot]) ST.nutManual[slot]=[];
  ST.nutManual[slot].push({n:name, qty:100});
  ST.nutShowReco=null;
  renderNut();
}

function goToNutrition(){
  var btn = document.querySelector('.nbtn:nth-child(2)');
  if(btn) nav('nutrition', btn);
}
function addToPlanner(){
  var sel=document.getElementById('plan-select');
  var qty=parseFloat(document.getElementById('plan-qty').value);
  if(!sel||!sel.value||!qty||qty<=0) return;
  ST.plannerSelections[sel.value]=(ST.plannerSelections[sel.value]||0)+qty;
  renderNut();
}
function removePlanner(btn){
  var name=btn.getAttribute('data-plan');
  delete ST.plannerSelections[name];
  renderNut();
}

function showAdvice24h(){
  ST.show24h = !ST.show24h;
  renderNut();
}

function applyReco(slot, variant){
  const reco = genReco(slot, variant || 'poisson');
  if(!reco || !reco.nextSlots) return;
  reco.nextSlots.forEach(s=>{
    if(!ST.nutSelections[s]) ST.nutSelections[s]={};
    (reco.recos[s]||[]).forEach(ri=>{
      ST.nutSelections[s][ri.n] = ri.qty;
    });
  });
  ST.nutShowReco=null;
  renderNut();
}
function applyRecoBtn(btn){ applyReco(btn.getAttribute('data-slot'), btn.getAttribute('data-variant')); }

    const last=wl.length?wl[wl.length-1]:null;

    h+='<div class="sbox"><div style="font-size:9px;color:#6B7280;margin-bottom:3px">Objectif</div><div style="font-size:22px;font-weight:800;color:#3B82F6">−4<span style="font-size:12px;color:#6B7280"> kg</span></div></div>';
    h+='</div>';
    if(wl.length>1){
      const cMax=Math.max.apply(null,wl.map(function(w){return w.p;}))+1;
      const cMin=Math.min.apply(null,wl.map(function(w){return w.p;}))-1;
      const tgtY=last?((cMax-(last.p-4))/(cMax-cMin))*80+5:50;
      const pts=wl.map(function(w,i){var x=(i/(wl.length-1))*290+5,y=((cMax-w.p)/(cMax-cMin))*80+5;return x+','+y;}).join(' ');

      h+='<svg width="100%" height="100" viewBox="0 0 300 100"><line x1="0" y1="'+tgtY+'" x2="300" y2="'+tgtY+'" stroke="#10B98150" stroke-width="1" stroke-dasharray="4,3"/><polyline points="'+pts+'" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'+circles+'</svg>';
      h+='<div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:9px;color:#4B5563">'+wl[0].d+'</span><span style="font-size:9px;color:#10B981">— objectif −4 kg</span><span style="font-size:9px;color:#4B5563">'+wl[wl.length-1].d+'</span></div></div>';
    }
    h+='<div class="card"><div class="slbl">Ajouter une mesure</div>';
    h+='<div style="display:flex;gap:8px;margin-bottom:8px"><input type="date" id="wd" style="flex:1"><input type="number" id="wv" placeholder="kg" step="0.1" style="width:70px"></div>';
    h+='<button class="btn-p" onclick="addW()">Ajouter ✓</button></div>';
    if(wl.length){
      const dow=parisDay();
      if(dow===1||dow===5) h+='<div style="padding:9px 12px;border-radius:9px;background:#1E3A5F;border:1px solid #3B82F640;font-size:11px;color:#93C5FD;margin-bottom:10px">⚖️ <b>Rappel</b> — Aujourd-hui: jour de pesée ! Rentre ton poids ci-dessus.</div>';

      [...wl].reverse().slice(0,10).forEach(function(w){ h+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #2D2D3F"><span style="font-size:11px;color:#9CA3AF">'+w.d+'</span><span style="font-size:12px;font-weight:700">'+w.p+' kg</span></div>'; });
      h+='</div>';
    } else {
      h+='<div class="gbox">💡 Commence le monitoring dès le lundi 22 juin — pèse-toi <b>lundi et vendredi matin</b>, à jeun, après les toilettes.</div>';
    }

  // ── IMPÉDANCE ──────────────────────────────────────────────────────────────
  } else if(ST.trTab==='impedance'){
    if(!il.length){
      h+='<div class="gbox">💡 Commence la balance à impédance dès le 22 juin.</div>';
    } else {
      // Dernière mesure
      const last=il[il.length-1];
      const imcCalc=last.p?(parseFloat(last.p)/(1.85*1.85)).toFixed(1):'—';
      h+='<div class="card"><div class="slbl">Dernière mesure · '+last.d+'</div><div class="igrid">';
      [{l:"Masse grasse",v:last.mg,u:"%",c:"#EF4444",t:"10–20%"},{l:"Masse muscu",v:last.mm,u:"%",c:"#3B82F6",t:"40–50%"},{l:"Eau",v:last.eau,u:"%",c:"#06B6D4",t:"55–65%"},{l:"IMC (auto)",v:imcCalc,u:"",c:"#8B5CF6",t:"< 25"},{l:"Poids",v:last.p,u:"kg",c:"#10B981",t:"82 kg"}].forEach(function(m){
        h+='<div class="icell" style="border:1px solid '+m.c+'30"><div class="ilbl">'+m.l+'</div><div class="ival" style="color:'+m.c+'">'+(m.v||'—')+'<span style="font-size:9px">'+m.u+'</span></div><div class="itgt">Cible : '+m.t+'</div></div>';
      });
      h+='</div></div>';

      // Évolution chiffrée
      if(il.length>1){
        const first=il[0];
        const firstImcCalc=first.p?(parseFloat(first.p)/(1.85*1.85)).toFixed(1):'—';
        // Convert % to kg for gras and muscle
        var p1=parseFloat(first.p)||86, p2=parseFloat(last.p)||86;
        var grasKg1=((parseFloat(first.mg)||0)/100*p1).toFixed(1);
        var grasKg2=((parseFloat(last.mg)||0)/100*p2).toFixed(1);
        var muscKg1=((parseFloat(first.mm)||0)/100*p1).toFixed(1);
        var muscKg2=((parseFloat(last.mm)||0)/100*p2).toFixed(1);
        var evolItems=[
          {l:"Masse grasse",v1:grasKg1,v2:grasKg2,u:" kg",good:"down"},

          h+='<div style="display:flex;align-items:center;gap:10px">';
          h+='<span style="font-size:11px;color:#4B5563">'+e.v1+e.u+' → '+e.v2+e.u+'</span>';

          h+='</div></div>';
        });
        h+='</div>';

        // Graphiques par indicateur
        // Pre-compute kg values for charts
        var ilKg = il.map(function(r){
          var pw=parseFloat(r.p)||86;

// ─── ANALYSE VOLUME MUSCULAIRE ─────────────────────────────────────────────────
const MUSCLE_GROUPS_FR = ["Dos","Pectoraux","Épaules","Biceps","Triceps","Jambes","Abdos / Gainage"];

// Mots-clés (FR + EN courants) -> groupe standardisé. Sert à classer un libellé musculaire libre.
const MUSCLE_KEYWORDS = {
  "Dos": ["dos","dorsal","dorsaux","lat","latissimus","rhomboïde","rhomboide","trapèze","trapeze","rowing","row","pulldown","traction","tirage","back"],
  "Pectoraux": ["pectoraux","pec","chest","pectoral","développé couché","developpe couche","press"],
  "Épaules": ["épaule","epaule","deltoïde","deltoide","shoulder","militaire","élévation","elevation"],
  "Biceps": ["biceps","curl","brachial"],
  "Triceps": ["triceps","dips","extension"],
  "Jambes": ["quadriceps","quadri","ischio","fessier","mollet","jambe","squat","leg","fente","cuisse"],
  "Abdos / Gainage": ["abdo","abdominal","gainage","transverse","planche","core","crunch"],
};

function classifyMuscleText(text){
  if(!text) return [];
  var lower = text.toLowerCase();
  var found = [];
  MUSCLE_GROUPS_FR.forEach(function(group){
    var kws = MUSCLE_KEYWORDS[group];
    for(var i=0;i<kws.length;i++){
      if(lower.indexOf(kws[i]) >= 0){ found.push(group); break; }
    }
  });
  return found;
}

// Récupère TOUS les exercices connus du programme (A, B, V) avec leur texte muscles
function getProgramExerciseMuscles(){
  var map = {};
  ['A','B','V'].forEach(function(k){
    (SEANCES[k]||[]).forEach(function(ex){ map[ex.name] = ex.muscles; });
  });
  return map;
}

// Combine journal de séance (programme) + journal libre pour calculer le volume
// par groupe musculaire sur les N dernières semaines / jours
function computeMuscleVolume(){
  var progMuscles = getProgramExerciseMuscles();
  var counts = {}; MUSCLE_GROUPS_FR.forEach(function(g){ counts[g]=0; });
  var exerciseHits = {}; // nom exercice -> nb d'occurrences, pour debug/affichage

  // 1) Journal de séance structuré (w{week}-d{day})
  var sessionJournal = S.get('journal') || {};
  Object.keys(sessionJournal).forEach(function(key){
    var entry = sessionJournal[key];
    if(!entry || !entry.done) return;
    Object.keys(entry).forEach(function(exName){
      if(exName==='done' || exName==='ressenti' || exName==='notes') return;
      var muscleTxt = progMuscles[exName];
      if(!muscleTxt) return; // pas un nom d'exercice connu
      var groups = classifyMuscleText(muscleTxt);
      groups.forEach(function(g){ counts[g] = (counts[g]||0) + 1; });
      exerciseHits[exName] = (exerciseHits[exName]||0) + 1;
    });
  });

  // 2) Journal libre (exercices hors-programme notés manuellement)
  var freeLog = S.get('freeExLog') || [];
  freeLog.forEach(function(e){
    var groups = classifyMuscleText(e.muscles || e.nom || '');
    groups.forEach(function(g){ counts[g] = (counts[g]||0) + 1; });
    exerciseHits[e.nom] = (exerciseHits[e.nom]||0) + 1;
  });

  return {counts: counts, exerciseHits: exerciseHits, freeLogCount: freeLog.length};
}

function getWeakestMuscleGroups(priorityGroups){
  var vol = computeMuscleVolume();
  var arr = MUSCLE_GROUPS_FR.map(function(g){ return {group:g, count:vol.counts[g]||0}; });
  // Priorité : Dos et haut du corps comptent double dans le tri (plus sensibles aux trous)
  var priority = priorityGroups || ["Dos","Épaules","Pectoraux","Biceps","Triceps"];
  arr.sort(function(a,b){
    var aw = (priority.indexOf(a.group)>=0 ? a.count*0.7 : a.count);
    var bw = (priority.indexOf(b.group)>=0 ? b.count*0.7 : b.count);
    return aw - bw;
  });
  return {sorted: arr, raw: vol};
}

async function identifyMachine(){
  var brand = ST.machBrand || '';
  var name = (ST.machName || '').trim();
  if(!name){
    ST.machError = 'Indique au moins le nom de la machine.';
    ST.machResult = null;
    renderEx();
    return;
  }
  ST.machLoading = true;
  ST.machError = null;
  ST.machResult = null;
  renderEx();

  var prompt = "Tu es coach de musculation. Identifie cette machine de salle de sport : marque \"" + (brand||"inconnue") + "\", nom \"" + name + "\". " +
    "Si besoin, utilise la recherche web pour confirmer le role exact de cette machine specifique a cette marque. " +
    "Le profil de l utilisateur : David, endodontiste, 86kg, 1m85, objectif perte de gras + maintien muscle, programme de musculation 2x/semaine en cours (seance haut du corps et seance bas du corps + tirage), niveau intermediaire. " +
    "Reponds UNIQUEMENT en JSON valide, sans markdown, sans texte autour, avec exactement ces champs : " +
    '{"nom": "nom complet de la machine", "marque": "marque", "muscles": "muscles cibles principaux et secondaires", "sets": "ex: 3x12", "charge": "charge de depart suggeree pour un homme intermediaire de 86kg, en kg ou en niveau machine", "repos": "ex: 90 sec", "execution": "description courte de l execution en 2-3 phrases", "conseil": "un conseil specifique a cette machine en 1 phrase"}';

  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }],
        tools: [{ type: "web_search_20250305", name: "web_search" }]
      })
    });
    const data = await response.json();
    var fullText = (data.content||[]).map(function(b){ return b.type==='text'?b.text:''; }).filter(Boolean).join('\n');
    var clean = fullText.replace(/```json|```/g,'').trim();
    var firstBrace = clean.indexOf('{');
    var lastBrace = clean.lastIndexOf('}');
    if(firstBrace>=0 && lastBrace>firstBrace) clean = clean.slice(firstBrace, lastBrace+1);
    var parsed = JSON.parse(clean);
    ST.machResult = parsed;
    ST.machError = null;
  }catch(err){
    ST.machError = "Impossible d identifier cette machine pour le moment. Reessaie ou precise mieux le nom.";
    ST.machResult = null;
  }
  ST.machLoading = false;
  renderEx();
}

function renderCarnet(){
  var analysis = getWeakestMuscleGroups();

  var maxCount = Math.max.apply(null, MUSCLE_GROUPS_FR.map(function(g){return counts[g]||0;}).concat([1]));
  var groupColors = {"Dos":"#10B981","Pectoraux":"#EF4444","Épaules":"#06B6D4","Biceps":"#F59E0B","Triceps":"#8B5CF6","Jambes":"#3B82F6","Abdos / Gainage":"#6B7280"};
  var groupEmoji = {"Dos":"🔙","Pectoraux":"🫁","Épaules":"🤷","Biceps":"💪","Triceps":"🦾","Jambes":"🦵","Abdos / Gainage":"🧱"};

  var h = '<div class="card">';

  MUSCLE_GROUPS_FR.forEach(function(g){

const CONSEIL_CATS = ["Nutrition","Lifestyle","Sport","Suivi","Conscience","Sante mentale"];

function computeConseilsData(){
  var journal = S.get('nutJournal') || {};
  var wLog = S.get('wLog') || [];
  var iLog = S.get('iLog') || [];
  var jDays = Object.values(journal);
  var avgKcal = jDays.length ? jDays.reduce(function(s,d){return s+d.totalK;},0)/jDays.length : 2400;
  var avgProt = jDays.length ? jDays.reduce(function(s,d){return s+d.totalP;},0)/jDays.length : 165;
  var weightLost = wLog.length > 1 ? wLog[0].p - wLog[wLog.length-1].p : 0;
  var sessionJournal = S.get('journal') || {};
  var doneWorkouts = Object.values(sessionJournal).filter(function(s){return s.done;}).length;
  return {
    avgKcal: avgKcal,
    avgProt: avgProt,
    journalDays: jDays.length,
    weightCount: wLog.length,
    impCount: iLog.length,
    hasWorkouts: doneWorkouts > 0,
    weightLost: weightLost
  };
}

function getTopConseils(excluded){
  excluded = excluded || [];
  var data = computeConseilsData();
  // Get one best conseil per category
  var result = [];
  CONSEIL_CATS.forEach(function(cat){
    var catItems = ALL_CONSEILS.filter(function(c){
      return c.cat === cat && excluded.indexOf(c.id) < 0;
    });
    if(!catItems.length) return;
    catItems.sort(function(a,b){ return b.score(data) - a.score(data); });
    result.push(catItems[0]);
  });
  return result;
}

function getRandomConseils(excluded, count){
  excluded = excluded || [];
  var data = computeConseilsData();
  var available = ALL_CONSEILS.filter(function(c){ return excluded.indexOf(c.id) < 0; });
  // Shuffle with score weighting
  available.sort(function(a,b){
    return (b.score(data) + Math.random()*4) - (a.score(data) + Math.random()*4);
  });
  return available.slice(0, count || 3);
}

    h += '<div style="font-size:18px;font-weight:800;color:' + kColor + '">' + day.totalK + '</div>';
    h += '<div class="pb-bg" style="margin-top:4px"><div class="pb-fill" style="width:' + kPct + '%;background:' + kColor + '"></div></div>';
    h += '</div>';
    h += '<div style="flex:1;background:#14141F;border-radius:9px;padding:9px;border:1px solid ' + pColor + '30">';
    h += '<div style="font-size:9px;color:#6B7280;margin-bottom:2px">Protéines</div>';
    h += '<div style="font-size:18px;font-weight:800;color:' + pColor + '">' + day.totalP + 'g</div>';
    h += '<div class="pb-bg" style="margin-top:4px"><div class="pb-fill" style="width:' + pPct + '%;background:' + pColor + '"></div></div>';
    h += '</div></div>';
    h += mealsDetail;
    h += '</div>';
  });

  document.getElementById('t-journal').innerHTML = h;
}

function renderDayMeals(day){
  if(!day.selections) return '';
  const slots = {pdj:'☀️ Petit déj', dej:'🍽️ Déjeuner', gouter:'🍎 Goûter', snack:'💪 Snack', diner:'🌙 Dîner'};
  let h = '<div style="border-top:1px solid #2D2D3F;padding-top:8px">';
  let hasAny = false;
  Object.entries(slots).forEach(function(entry){
    const id = entry[0], lbl = entry[1];
    const sel = day.selections[id]||{};
    const manual = (day.manual||{})[id]||[];
    const items = [];
    Object.entries(sel).forEach(function(e){ items.push({n:e[0],q:e[1]}); });
    manual.forEach(function(m){ items.push({n:m.n,q:m.qty}); });
    if(items.length === 0) return;
    hasAny = true;
    let itemsHtml = '';
    items.forEach(function(i){
      const a = ALIMENTS[i.n];
      const m = calcMacros(i.n, i.q);
      if(itemsHtml) itemsHtml += ' · ';
      itemsHtml += (a&&a.emoji?a.emoji:'🍽️') + ' ' + i.n + ' ' + i.q + 'g <span style="color:#4B5563">(' + m.k + 'kcal)</span>';
    });
    h += '<div style="margin-bottom:6px">';
    h += '<div style="font-size:10px;font-weight:700;color:#9CA3AF;margin-bottom:3px">' + lbl + '</div>';
    h += '<div style="font-size:11px;color:#6B7280;line-height:1.6">' + itemsHtml + '</div>';
    h += '</div>';
  });
  h += '</div>';
  return hasAny ? h : '';
}

function loadDay(date){
  ST.nutDate = date;
  const saved = (S.get('nutJournal')||{})[date];
  if(saved){
    ST.nutSelections = JSON.parse(JSON.stringify(saved.selections||{}));
    ST.nutManual = JSON.parse(JSON.stringify(saved.manual||{}));
  }
  nav('nutrition', document.querySelector('.nbtn:nth-child(2)'));
}

function loadDayBtn(btn){ loadDay(btn.getAttribute('data-date')); }

function deleteDay(date){
  const journal = S.get('nutJournal')||{};
  delete journal[date];
  S.set('nutJournal', journal);
  renderJournal();
}

function deleteDayBtn(btn){ deleteDay(btn.getAttribute('data-date')); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
function render(t){
  ST._activeTab = t;
  if(t==='semaine')renderSem();
  else if(t==='nutrition')renderNut();
  else if(t==='journal')renderJournal();
  else if(t==='tracker')renderTr();
  else if(t==='exercices')renderEx();
  else if(t==='jeune')renderJeunePage();
}

// Load custom aliments from localStorage into ALIMENTS
(function loadCustomAliments(){
  var custom = S.get('customAliments') || {};
  Object.keys(custom).forEach(function(name){
    var a = custom[name];
    ALIMENTS[name] = {k:a.k, p:a.p, g:a.g, l:a.l, emoji:'🍽️', cat:'Mes aliments'};
  });
  // Add 'Mes aliments' to cats if not there
  if(ALIMENT_CATS.indexOf('Mes aliments') < 0 && Object.keys(custom).length > 0){
    ALIMENT_CATS.push('Mes aliments');
  }
})();

// Auto-load today's nutrition data on startup
(function initNutrition(){
  const today = parisDateStr();
  // Restore last selected week
  var savedWeek = S.get('lastWeek');
  if(savedWeek && savedWeek >= 1 && savedWeek <= 10) ST.week = savedWeek;

  ST.nutDate = today;
  const saved = (S.get('nutJournal')||{})[today];
  if(saved && saved.selections){
    ST.nutSelections = JSON.parse(JSON.stringify(saved.selections));
    ST.nutManual = JSON.parse(JSON.stringify(saved.manual||{}));
  }
  // Purge entries older than 7 days
  const journal = S.get('nutJournal')||{};
  const cutoffDate = new Date();
  cutoffDate.setDate(cutoffDate.getDate()-7);
  const cutoffStr = cutoffDate.toLocaleDateString('fr-CA',{timeZone:'Europe/Paris'});
  let purged = false;
  Object.keys(journal).forEach(function(d){
    if(d < cutoffStr){ delete journal[d]; purged=true; }
  });
  if(purged) S.set('nutJournal', journal);

  // Restaurer l'état jeûne depuis localStorage s'il était actif
  var savedJeune = S.get('jeuneState');
  if(savedJeune){
    try {
      var jst = JSON.parse(savedJeune);
      if(jst.jeuneActif){ ST.jeuneActif=jst.jeuneActif; ST.jeuneNom=jst.jeuneNom||''; ST.jeuneDebut=jst.jeuneDebut; ST.jeuneFin=jst.jeuneFin; ST.jeuneDate=jst.jeuneDate; }
    } catch(e){}
  }
})();

// Timer live : rafraîchit le bandeau jeûne chaque minute si actif
setInterval(function(){
  if(ST.jeuneActif){
    S.set('jeuneState', JSON.stringify({jeuneActif:true, jeuneNom:ST.jeuneNom, jeuneDebut:ST.jeuneDebut, jeuneFin:ST.jeuneFin, jeuneDate:ST.jeuneDate}));
    // Highlight bouton nav jeûne
    var jBtn = document.getElementById('nbtn-jeune');
    if(jBtn && !jBtn.classList.contains('act')) jBtn.style.color = '#C4B5FD';
    // Rafraîchir l'onglet actif (bandeau mis à jour partout)
    if(ST._activeTab) render(ST._activeTab);
  } else {
    S.set('jeuneState', null);
    var jBtn2 = document.getElementById('nbtn-jeune');
    if(jBtn2) jBtn2.style.color = '';
  }
}, 60000);

renderSem();
</script>
