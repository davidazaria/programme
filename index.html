<title>Mon Programme 💪</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0F0F1A;color:#F1F1F5;font-family:-apple-system,system-ui,sans-serif;padding-bottom:80px;min-height:100vh}
button,input,textarea,select{font-family:inherit;cursor:pointer;outline:none}
input[type=date],select{color-scheme:dark}
.hdr{background:linear-gradient(135deg,#1A1A2E,#16213E);padding:52px 20px 14px;border-bottom:1px solid #2D2D3F}
.hdr-sub{font-size:9px;color:#6B7280;letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px}
.hdr h1{font-size:20px;font-weight:900;letter-spacing:-.02em}
.hdr-desc{font-size:11px;color:#6B7280;margin-top:3px}
.content{padding:14px 16px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#0F0F1A;border-top:1px solid #2D2D3F;display:flex;padding:6px 8px env(safe-area-inset-bottom,14px)}
.nbtn{flex:1;border:none;background:transparent;padding:6px 2px;display:flex;flex-direction:column;align-items:center;gap:2px}
.nem{font-size:18px;opacity:.35}
.nlb{font-size:9px;font-weight:700;color:#6B7280}
.nbtn.act .nem{opacity:1}.nbtn.act .nlb{color:#3B82F6}
.tab{display:none}.tab.act{display:block}
.card{background:#1E1E2E;border-radius:14px;padding:14px;border:1px solid #2D2D3F;margin-bottom:12px}
.slbl{font-size:10px;color:#6B7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-block}
.pill-row{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.pill{flex:1;min-width:60px;padding:10px 4px;border-radius:11px;border:1.5px solid #2D2D3F;background:#1E1E2E;text-align:center}
.pill.act{border-color:#3B82F6;background:#1E3A5F}
.pill .pe{font-size:16px;margin-bottom:2px}
.pill .pl{font-size:10px;font-weight:700;color:#6B7280}
.pill.act .pl{color:#93C5FD}
.wbtn{width:34px;height:34px;border-radius:9px;border:none;font-weight:700;font-size:12px;background:#1E1E2E;color:#6B7280;position:relative}
.wbtn.act{background:#3B82F6;color:#fff}
.wbtn.decharge{border:1.5px solid #F59E0B!important;color:#F59E0B}
.wbtn.vacances{border:1.5px solid #06B6D4!important;color:#06B6D4}
.wbtn.vacances.act{background:#06B6D4;color:#fff}
.fbadge{margin-top:10px;padding:8px 12px;border-radius:10px;background:#1E3A5F;border:1px solid #3B82F640;font-size:12px;color:#93C5FD}
.fbadge.db{background:#2D1F00;border-color:#F59E0B40;color:#FCD34D}
.fbadge.vb{background:#0F2B2B;border-color:#06B6D440;color:#67E8F9}
.dbtn{flex:1;padding:7px 3px;border-radius:9px;border:1.5px solid #2D2D3F;background:transparent;position:relative}
.dlbl{font-size:8px;font-weight:700;color:#6B7280;margin-bottom:3px}
.ddot{position:absolute;top:2px;right:2px;width:6px;height:6px;border-radius:50%;background:#10B981}
.exc{display:flex;align-items:center;gap:10px;padding:9px;background:#14141F;border-radius:9px;margin-bottom:7px}
.esvg{min-width:44px;display:flex;justify-content:center}
.enm{font-size:12px;font-weight:700;color:#F1F1F5}
.emu{font-size:10px;color:#6B7280}
.elo{text-align:right}
.eset{font-size:11px;font-weight:700}
.ekg{font-size:10px;color:#9CA3AF}
.pb-wrap{margin-bottom:7px}
.pb-lbl{display:flex;justify-content:space-between;margin-bottom:3px}
.pb-bg{height:3px;background:#2D2D3F;border-radius:2px}
.pb-fill{height:100%;border-radius:2px;transition:width .4s}
.btn-p{width:100%;padding:11px;border-radius:10px;border:none;background:#3B82F6;color:#fff;font-size:13px;font-weight:700}
.btn-g{width:100%;padding:11px;border-radius:10px;border:none;background:#10B981;color:#fff;font-size:13px;font-weight:700}
.btn-s{width:100%;padding:11px;border-radius:10px;border:1px solid #2D2D3F;background:transparent;color:#6B7280;font-size:13px}

.jinp{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #2D2D3F;background:#14141F;color:#F1F1F5;font-size:12px}
.rrow{display:flex;gap:6px;margin-bottom:10px}
.rbtn{flex:1;padding:6px 4px;border-radius:8px;border:1px solid #2D2D3F;background:#14141F;color:#6B7280;font-size:10px;font-weight:600}
.rbtn.act{border-color:#3B82F6;background:#1E3A5F;color:#93C5FD}
.meal-card{background:#1E1E2E;border-radius:13px;border:1px solid #2D2D3F;overflow:hidden;margin-bottom:9px}
.meal-hdr{padding:13px;display:flex;align-items:center;gap:10px}
.meal-body{border-top:1px solid #2D2D3F;padding:12px}
.macbox{flex:1;background:#1E1E2E;border-radius:11px;padding:11px}
.mval{font-size:18px;font-weight:800}
.ebtn{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border:1.5px solid #2D2D3F;background:#1E1E2E;text-align:left;width:100%;margin-bottom:8px}
.ebtn.sel{border-color:#F59E0B;background:#2D1F00}
.sbox{flex:1;background:#1E1E2E;border-radius:11px;padding:12px}
.igrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.icell{background:#14141F;border-radius:10px;padding:10px}
.ival{font-size:16px;font-weight:800}
.ilbl{font-size:9px;color:#6B7280;margin-bottom:3px;line-height:1.2}
.itgt{font-size:8px;color:#4B5563;margin-top:2px}
.igform{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.iflbl{font-size:9px;color:#6B7280;margin-bottom:3px}
input[type=number],input[type=date],input[type=text]{background:#14141F;border:1px solid #2D2D3F;border-radius:8px;color:#F1F1F5;padding:8px 10px;font-size:12px;width:100%}
select{background:#14141F;border:1px solid #2D2D3F;border-radius:8px;color:#F1F1F5;padding:8px 10px;font-size:12px;width:100%}
textarea{background:#14141F;border:1px solid #2D2D3F;border-radius:8px;color:#F1F1F5;padding:8px 10px;font-size:12px;width:100%;resize:none}
.ssup{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:3px 11px;margin-bottom:9px;border:1.5px solid}
.exk{background:#1E1E2E;border-radius:11px;padding:11px;border:1px solid #2D2D3F;margin-bottom:7px}
.exk.open{border-color:var(--ec)}
.edesc{margin-top:9px;padding-top:9px;border-top:1px solid #2D2D3F;font-size:11px;color:#A1A1B5;line-height:1.6}

.food-item{display:flex;align-items:center;gap:8px;padding:8px;background:#14141F;border-radius:9px;margin-bottom:6px;border:1px solid #2D2D3F}
.food-item.selected{border-color:#10B981;background:#0F2B1F}
.food-check{width:20px;height:20px;border-radius:6px;border:1.5px solid #374151;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px}
.food-item.selected .food-check{background:#10B981;border-color:#10B981}
.food-name{flex:1;font-size:12px;color:#F1F1F5}
.food-macros{font-size:10px;color:#6B7280;text-align:right}
.food-qty{width:55px;padding:4px 6px;border-radius:6px;border:1px solid #374151;background:#1E1E2E;color:#F1F1F5;font-size:11px;text-align:center}
.macro-summary{display:flex;gap:6px;margin:12px 0;padding:10px;background:#14141F;border-radius:10px}
.ms-item{flex:1;text-align:center}
.ms-val{font-size:16px;font-weight:800}
.ms-lbl{font-size:9px;color:#6B7280}
.reco-card{background:#0F2B1F;border:1px solid #10B98140;border-radius:12px;padding:12px;margin-top:10px}
.reco-item{padding:8px 0;border-bottom:1px solid #1A3A2A;font-size:12px;color:#D1FAE5;line-height:1.5}
.reco-item:last-child{border-bottom:none}
.day-total-bar{height:8px;border-radius:4px;background:#2D2D3F;overflow:hidden;margin:4px 0}
.day-total-fill{height:100%;border-radius:4px;transition:width .5s}

</head>

// ─── DATE PARIS ───────────────────────────────────────────────────────────────
function parisDateStr(){
  return new Date().toLocaleDateString('fr-CA',{timeZone:'Europe/Paris'});
  // fr-CA retourne le format YYYY-MM-DD, identique a toISOString mais en heure Paris
}
function parisHour(){
  return parseInt(new Date().toLocaleString('fr-FR',{timeZone:'Europe/Paris',hour:'2-digit',hour12:false}),10);
}
function parisDay(){
  // 0=dimanche, 1=lundi ... 6=samedi — identique a getDay() mais en heure Paris
  var days = ['dim','lun','mar','mer','jeu','ven','sam'];
  var dayStr = new Date().toLocaleDateString('fr-FR',{timeZone:'Europe/Paris',weekday:'short'});
  var idx = days.indexOf(dayStr.toLowerCase().replace('.',''));
  return idx >= 0 ? idx : new Date().getDay();
}

function calcMacros(name, qty){
  const a = ALIMENTS[name];
  if(!a) return {k:0,p:0,g:0,l:0};
  return {
    k: Math.round(a.k * qty / 100),
    p: Math.round(a.p * qty / 100 * 10) / 10,
    g: Math.round(a.g * qty / 100 * 10) / 10,
    l: Math.round(a.l * qty / 100 * 10) / 10,
  };
}

function getSlotTotals(slotId){
  const sel = ST.nutSelections[slotId] || {};
  const manual = ST.nutManual[slotId] || [];
  let tk=0, tp=0;
  Object.entries(sel).forEach(([name, qty])=>{
    const m = calcMacros(name, qty);
    tk += m.k; tp += m.p;
  });
  manual.forEach(mi=>{
    const m = calcMacros(mi.n, mi.qty);
    tk += m.k; tp += m.p;
  });
  return {k: Math.round(tk), p: Math.round(tp*10)/10};
}

function getDayTotals(){
  let tk=0, tp=0;
  ['pdj','dej','gouter','snack','diner'].forEach(s=>{
    const t = getSlotTotals(s);
    tk += t.k; tp += t.p;
  });
  return {k: Math.round(tk), p: Math.round(tp*10)/10};
}

function genReco(slotId, variant){
  // variant: 'poisson' | 'viande' | 'vegetal'
  variant = variant || 'poisson';
  // Calcule ce qui reste à manger après ce slot
  const slots = ['pdj','dej','gouter','snack','diner'];

    doneK += t.k; doneP += t.p;

function fmtDuree(min){
  if(min <= 0) return '0 min';
  var h = Math.floor(min / 60);
  var m = min % 60;
  if(h === 0) return m + 'min';
  if(m === 0) return h + 'h';
  return h + 'h' + (m < 10 ? '0' : '') + m;
}

function calcJeuneInfo(){
  if(!ST.jeuneActif || !ST.jeuneDebut || !ST.jeuneFin) return {enCours:false, dureeMin:0, restantMin:0, pct:0, ecoulMin:0, termine:false};
  var now = new Date();
  var startDate = ST.jeuneDate || parisDateStr();
  var debut = new Date(startDate + 'T' + ST.jeuneDebut + ':00');
  var fin = new Date(startDate + 'T' + ST.jeuneFin + ':00');
  if(fin <= debut) fin.setDate(fin.getDate() + 1);
  var dureeMin = Math.round((fin - debut) / 60000);
  var ecoulMin = Math.round((now - debut) / 60000);
  var restantMin = Math.max(0, Math.round((fin - now) / 60000));
  var pct = Math.min(Math.max((ecoulMin / dureeMin) * 100, 0), 100);
  var enCours = now >= debut && now < fin;
  var termine = now >= fin;
  return {enCours, termine, dureeMin, ecoulMin, restantMin, pct, debut, fin};
}

function renderJeunePage2(){ renderJeunePage(); }

async function fetchJeuneHoraires(){
  var jeuneId = ST.jeuneSelected;
  if(!jeuneId){ ST.jeuneError = "Sélectionne d'abord un jeûne."; renderJeunePage(); return; }
  var ville = (ST.jeuneVille||'Paris').trim();
  var jeune = JEUNES_HEBRAIQUES.find(function(j){ return j.id === jeuneId; });
  if(!jeune){ ST.jeuneError = "Jeûne introuvable."; renderJeunePage(); return; }

  // Date la plus proche dans le futur
  var now = parisDateStr();
  var dateJeune = (jeune.date_2025 && jeune.date_2025 >= now) ? jeune.date_2025 : (jeune.date_2026 || jeune.date_2025);

  ST.jeuneLoading = true; ST.jeuneError = null; ST.jeuneHoraires = null;
  ST.jeuneDebutOverride = ''; ST.jeuneFinOverride = '';
  renderJeunePage();

  var dateFr = dateJeune ? new Date(dateJeune+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}) : 'date inconnue';
  var prompt = "Je cherche les horaires precis du coucher du soleil et de la nuit tombee (tzet hakochavim, 3 etoiles visibles) pour le jeune juif \""+jeune.nom+"\" le "+dateFr+" a "+ville+". "
    + "Ce jeune commence au coucher du soleil (pour les jeunes de 25h) ou a l aube/alba (pour les jeunes de jour). Il se termine a la nuit tombee (apparition des etoiles). "
    + "Recherche les horaires solaires precis pour "+ville+" a cette date. "
    + "Reponds UNIQUEMENT en JSON valide sans markdown : "
    + '{"ville":"'+ville+'","date":"'+dateFr+'","debut":"HH:MM","debut_label":"ex: coucher du soleil / aube","fin":"HH:MM","fin_label":"ex: nuit tombee / 3 etoiles visibles","duree_heures": nombre,"note":"info utile en 1 phrase si necessaire"}';

  try{
    var resp = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-6", max_tokens:600,
        tools:[{type:"web_search_20250305",name:"web_search"}],
        messages:[{role:"user",content:prompt}]
      })
    });
    var data = await resp.json();
    var txt = (data.content||[]).map(function(b){return b.type==='text'?b.text:'';}).filter(Boolean).join('\n');
    var clean = txt.replace(/```json|```/g,'').trim();
    var f = clean.indexOf('{'), l = clean.lastIndexOf('}');
    if(f>=0 && l>f) clean = clean.slice(f,l+1);
    var parsed = JSON.parse(clean);
    ST.jeuneHoraires = parsed;
    ST.jeuneError = null;
    // Pré-remplir les overrides avec les valeurs trouvées
    ST.jeuneDebutOverride = parsed.debut || '';
    ST.jeuneFinOverride = parsed.fin || '';
    // Stocker le nom du jeûne et la date sélectionnée
    ST.jeuneSelectedNom = jeune.nom;
    ST.jeuneSelectedDate = dateJeune;
  }catch(e){
    ST.jeuneError = "Impossible de récupérer les horaires. Vérifie ta connexion et réessaie.";
    ST.jeuneHoraires = null;
  }
  ST.jeuneLoading = false;
  renderJeunePage();
}

function activerJeune(){
  var hr = ST.jeuneHoraires;
  if(!hr) return;
  ST.jeuneActif = true;
  ST.jeuneNom = ST.jeuneSelectedNom || hr.nom || 'Jeûne';
  ST.jeuneDebut = ST.jeuneDebutOverride || hr.debut || '';
  ST.jeuneFin = ST.jeuneFinOverride || hr.fin || '';
  ST.jeuneDate = ST.jeuneSelectedDate || parisDateStr();
  S.set('jeuneState', JSON.stringify({
    jeuneActif:true, jeuneNom:ST.jeuneNom,
    jeuneDebut:ST.jeuneDebut, jeuneFin:ST.jeuneFin, jeuneDate:ST.jeuneDate
  }));
  renderJeunePage();
}

function setNutSlot(s){ ST.nutSlot=s; ST.nutShowReco=null; renderNut(); }

function openJeunePage(){
  // Cache tous les tabs, affiche t-jeune
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('act'));
  document.querySelectorAll('.nbtn').forEach(x=>x.classList.remove('act'));
  document.getElementById('t-jeune').classList.add('act');
  ST._activeTab = 'jeune';
  window.scrollTo(0,0);
  renderJeunePage();
}

function setNutDate(d){
  ST.nutDate = d;
  // Load saved data for this date if exists
  const saved = (S.get('nutJournal')||{})[d];
  if(saved && saved.selections){
    ST.nutSelections = JSON.parse(JSON.stringify(saved.selections));
    ST.nutManual = JSON.parse(JSON.stringify(saved.manual||{}));
  } else {
    ST.nutSelections = {};
    ST.nutManual = {};
  }
  renderNut();
}

function saveDay(){
  const date = ST.nutDate || parisDateStr();
  const dayT = getDayTotals();
  const journal = S.get('nutJournal') || {};
  journal[date] = {
    date,
    selections: JSON.parse(JSON.stringify(ST.nutSelections)),
    manual: JSON.parse(JSON.stringify(ST.nutManual||{})),
    totalK: dayT.k,
    totalP: dayT.p,
    savedAt: new Date().toLocaleTimeString('fr-FR')
  };
  S.set('nutJournal', journal);
  renderNut();
  // Petit flash de confirmation
  const btn = document.querySelector('#t-nutrition button[onclick="saveDay()"]');
  if(btn){ btn.textContent = '✓ Sauvegardé !'; setTimeout(()=>{ btn.textContent = '💾 Enregistrer'; }, 2000); }
}

function togFood(slot, name, defaultQty){
  if(!ST.nutSelections[slot]) ST.nutSelections[slot]={};
  if(ST.nutSelections[slot].hasOwnProperty(name)){
    delete ST.nutSelections[slot][name];
  } else {
    ST.nutSelections[slot][name] = defaultQty;
  }
  ST.nutShowReco=null;
  renderNut();
}

// Calcule la liste des 10 aliments les plus frequemment consommes pour un repas donne,
// a partir de l historique reel (nutJournal). Complete avec les valeurs par defaut
// (MEAL_SLOTS) si l historique ne fournit pas encore 10 aliments distincts.
// Recalculee a chaque ouverture de l app -> se met a jour automatiquement chaque jour.
function getSlotDisplayItems(slotId){
  var defaultItems = MEAL_SLOTS[slotId].items;
  var journal = S.get('nutJournal') || {};
  var counts = {};
  Object.keys(journal).forEach(function(date){
    var day = journal[date];
    if(!day) return;
    var sel = (day.selections && day.selections[slotId]) || {};
    Object.keys(sel).forEach(function(name){
      if(!counts[name]) counts[name] = {count:0, qtySum:0};
      counts[name].count++;
      counts[name].qtySum += parseFloat(sel[name])||0;
    });
    var manual = (day.manual && day.manual[slotId]) || [];
    manual.forEach(function(mi){
      if(!counts[mi.n]) counts[mi.n] = {count:0, qtySum:0};
      counts[mi.n].count++;
      counts[mi.n].qtySum += parseFloat(mi.qty)||0;
    });
  });
  var ranked = Object.keys(counts).map(function(name){
    var c = counts[name];
    return {n:name, count:c.count, avgQty:Math.round(c.qtySum/c.count)||100};
  });
  ranked.sort(function(a,b){ return b.count - a.count; });
  var top = ranked.slice(0, 10).map(function(r){ return {n:r.n, qty:r.avgQty}; });
  // Complete avec les aliments par defaut si moins de 10 aliments dans l historique
  if(top.length < 10){
    var already = top.map(function(t){ return t.n; });
    defaultItems.forEach(function(it){
      if(top.length >= 10) return;
      if(already.indexOf(it.n) < 0){
        top.push({n:it.n, qty:it.qty});
        already.push(it.n);
      }
    });
  }
  return top;
}

          {l:"IMC",v1:parseFloat(firstImcCalc)||0,v2:parseFloat(imcCalc)||0,u:"",good:"down"},

function loadMoreConseils(){
  var data = computeConseilsData();
  var current = ST.conseilsShown || [];
  var newItems = [];
  CONSEIL_CATS.forEach(function(cat){
    var catItems = ALL_CONSEILS.filter(function(c){ return c.cat === cat && current.indexOf(c.id) < 0; });
    // Si tous les conseils de cette cat ont ete vus, reprendre depuis le debut (hors affichage courant)
    if(!catItems.length){
      catItems = ALL_CONSEILS.filter(function(c){ return c.cat === cat; });
    }
    if(!catItems.length) return;
    catItems.sort(function(a,b){
      return (b.score(data) + Math.random()*5) - (a.score(data) + Math.random()*5);
    });
    newItems.push(catItems[0].id);
  });
  ST.conseilsShown = newItems;
  // On ne met PAS a jour conseilsDay — le tirage du jour reste valide jusqu a minuit
  renderTr();
}

function pickMuscleConseils(count, excluded){
  var pool = MUSCLE_LOSS_CONSEILS.filter(function(c){ return excluded.indexOf(c.id) < 0; });
  if(pool.length < count) pool = MUSCLE_LOSS_CONSEILS.slice(); // repart de zero si epuise
  var shuffled = pool.slice().sort(function(){ return Math.random() - 0.5; });
  return shuffled.slice(0, count).map(function(c){ return c.id; });
}

function loadMuscleConseils(){
  var current = ST.muscleConseilsShown || [];
  ST.muscleConseilsShown = pickMuscleConseils(5, current);
  renderTr();
}

const MUSCLE_KEYWORDS = {
  "Dos": ["dos","dorsal","dorsaux","lat","latissimus","rhomboïde","rhomboide","trapèze","trapeze","rowing","row","pulldown","traction","tirage","back"],
  "Pectoraux": ["pectoraux","pec","chest","pectoral","développé couché","developpe couche","press"],
  "Épaules": ["épaule","epaule","deltoïde","deltoide","shoulder","militaire","élévation","elevation"],
  "Biceps": ["biceps","curl","brachial"],
  "Triceps": ["triceps","dips","extension"],
  "Jambes": ["quadriceps","quadri","ischio","fessier","mollet","jambe","squat","leg","fente","cuisse"],
  "Abdos / Gainage": ["abdo","abdominal","gainage","transverse","planche","core","crunch"],
};

function classifyMuscleText(text){
  if(!text) return [];
  var lower = text.toLowerCase();
  var found = [];
  MUSCLE_GROUPS_FR.forEach(function(group){
    var kws = MUSCLE_KEYWORDS[group];
    for(var i=0;i<kws.length;i++){
      if(lower.indexOf(kws[i]) >= 0){ found.push(group); break; }
    }
  });
  return found;
}

// Récupère TOUS les exercices connus du programme (A, B, V) avec leur texte muscles
function getProgramExerciseMuscles(){
  var map = {};
  ['A','B','V'].forEach(function(k){
    (SEANCES[k]||[]).forEach(function(ex){ map[ex.name] = ex.muscles; });
  });
  return map;
}

// Combine journal de séance (programme) + journal libre pour calculer le volume
// par groupe musculaire sur les N dernières semaines / jours
function computeMuscleVolume(){
  var progMuscles = getProgramExerciseMuscles();
  var counts = {}; MUSCLE_GROUPS_FR.forEach(function(g){ counts[g]=0; });
  var exerciseHits = {}; // nom exercice -> nb d'occurrences, pour debug/affichage

  // 1) Journal de séance structuré (w{week}-d{day})
  var sessionJournal = S.get('journal') || {};
  Object.keys(sessionJournal).forEach(function(key){
    var entry = sessionJournal[key];
    if(!entry || !entry.done) return;
    Object.keys(entry).forEach(function(exName){
      if(exName==='done' || exName==='ressenti' || exName==='notes') return;
      var muscleTxt = progMuscles[exName];
      if(!muscleTxt) return; // pas un nom d'exercice connu
      var groups = classifyMuscleText(muscleTxt);
      groups.forEach(function(g){ counts[g] = (counts[g]||0) + 1; });
      exerciseHits[exName] = (exerciseHits[exName]||0) + 1;
    });
  });

  // 2) Journal libre (exercices hors-programme notés manuellement)
  var freeLog = S.get('freeExLog') || [];
  freeLog.forEach(function(e){
    var groups = classifyMuscleText(e.muscles || e.nom || '');
    groups.forEach(function(g){ counts[g] = (counts[g]||0) + 1; });
    exerciseHits[e.nom] = (exerciseHits[e.nom]||0) + 1;
  });

  return {counts: counts, exerciseHits: exerciseHits, freeLogCount: freeLog.length};
}

function getWeakestMuscleGroups(priorityGroups){
  var vol = computeMuscleVolume();
  var arr = MUSCLE_GROUPS_FR.map(function(g){ return {group:g, count:vol.counts[g]||0}; });
  // Priorité : Dos et haut du corps comptent double dans le tri (plus sensibles aux trous)
  var priority = priorityGroups || ["Dos","Épaules","Pectoraux","Biceps","Triceps"];
  arr.sort(function(a,b){
    var aw = (priority.indexOf(a.group)>=0 ? a.count*0.7 : a.count);
    var bw = (priority.indexOf(b.group)>=0 ? b.count*0.7 : b.count);
    return aw - bw;
  });
  return {sorted: arr, raw: vol};
}

async function identifyMachine(){
  var brand = ST.machBrand || '';
  var name = (ST.machName || '').trim();
  if(!name){
    ST.machError = 'Indique au moins le nom de la machine.';
    ST.machResult = null;
    renderEx();
    return;
  }
  ST.machLoading = true;
  ST.machError = null;
  ST.machResult = null;
  renderEx();

  var prompt = "Tu es coach de musculation. Identifie cette machine de salle de sport : marque \"" + (brand||"inconnue") + "\", nom \"" + name + "\". " +
    "Si besoin, utilise la recherche web pour confirmer le role exact de cette machine specifique a cette marque. " +
    "Le profil de l utilisateur : David, endodontiste, 86kg, 1m85, objectif perte de gras + maintien muscle, programme de musculation 2x/semaine en cours (seance haut du corps et seance bas du corps + tirage), niveau intermediaire. " +
    "Reponds UNIQUEMENT en JSON valide, sans markdown, sans texte autour, avec exactement ces champs : " +
    '{"nom": "nom complet de la machine", "marque": "marque", "muscles": "muscles cibles principaux et secondaires", "sets": "ex: 3x12", "charge": "charge de depart suggeree pour un homme intermediaire de 86kg, en kg ou en niveau machine", "repos": "ex: 90 sec", "execution": "description courte de l execution en 2-3 phrases", "conseil": "un conseil specifique a cette machine en 1 phrase"}';

  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }],
        tools: [{ type: "web_search_20250305", name: "web_search" }]
      })
    });
    const data = await response.json();
    var fullText = (data.content||[]).map(function(b){ return b.type==='text'?b.text:''; }).filter(Boolean).join('\n');
    var clean = fullText.replace(/```json|```/g,'').trim();
    var firstBrace = clean.indexOf('{');
    var lastBrace = clean.lastIndexOf('}');
    if(firstBrace>=0 && lastBrace>firstBrace) clean = clean.slice(firstBrace, lastBrace+1);
    var parsed = JSON.parse(clean);
    ST.machResult = parsed;
    ST.machError = null;
  }catch(err){
    ST.machError = "Impossible d identifier cette machine pour le moment. Reessaie ou precise mieux le nom.";
    ST.machResult = null;
  }
  ST.machLoading = false;
  renderEx();
}

    var clean = fullText.replace(/```json|```/g,'').trim();
    var firstBrace = clean.indexOf('{');
    var lastBrace = clean.lastIndexOf('}');
    if(firstBrace>=0 && lastBrace>firstBrace) clean = clean.slice(firstBrace, lastBrace+1);
    var parsed = JSON.parse(clean);
    ST.gapResult = parsed;
    ST.gapError = null;
  }catch(err){
    ST.gapError = "Impossible de générer l analyse pour le moment. Réessaie dans un instant.";
    ST.gapResult = null;
  }
  ST.gapLoading = false;
  renderEx();
}

  {id:"m_t2",emoji:"⏱️",titre:"Seuil de leucine par repas",txt:"Il faut environ 2,5-3g de leucine par prise pour declencher pleinement la synthese proteique musculaire. Un repas trop leger en proteines, meme frequent, ne suffit pas."},
  {id:"m_t3",emoji:"⏱️",titre:"Ne laisse jamais un trou de plus de 5h",txt:"Un intervalle trop long entre deux apports proteiques, notamment la nuit, augmente la fenetre de catabolisme musculaire net."},
  {id:"m_t4",emoji:"⏱️",titre:"Proteine avant le coucher",txt:"30g de proteines a digestion lente (fromage blanc, skyr) avant de dormir reduit le catabolisme nocturne et soutient la synthese proteique pendant le sommeil."},
  {id:"m_t5",emoji:"⏱️",titre:"Petit dejeuner trop leger en proteines",txt:"Si ton premier repas contient moins de 25-30g de proteines, tu demarres la journee dans un etat catabolique plus long que necessaire."},
  {id:"m_t6",emoji:"⏱️",titre:"Le lendemain de seance compte double",txt:"Les 24-48h suivant une seance de muscu sont la fenetre ou l apport proteique regulier a le plus d impact sur la retention musculaire."},
  {id:"m_t7",emoji:"⏱️",titre:"Trop de proteines d un coup = gaspillage partiel",txt:"Au-dela de 40-50g de proteines en une seule prise, l efficacite marginale sur la synthese proteique diminue fortement — mieux vaut etaler."},
  {id:"m_t8",emoji:"⏱️",titre:"Proteines et sommeil decale",txt:"Si tes horaires de repas varient beaucoup (garde, urgences), les periodes de jeune involontaire de 8h+ pendant la journee favorisent le catabolisme malgre un total journalier correct."},
  {id:"m_t9",emoji:"⏱️",titre:"Le lendemain d un jeune religieux",txt:"Apres un jeune prolonge, les 24h suivantes sont critiques pour reconstituer un apport proteique regulier — un seul gros repas ne compense pas la fenetre de jeune."},
  {id:"m_t10",emoji:"⏱️",titre:"Verifie ta derniere prise avant la seance du matin",txt:"S entrainer a jeun depuis plus de 10-12h sans proteine recente augmente le catabolisme musculaire pendant la seance elle-meme."},
  {id:"m_q1",emoji:"🍗",titre:"165g affiches vs 165g reels",txt:"Un aliment mal pese (a l oeil plutot qu a la balance) peut sous-estimer les proteines de 20-30%. Verifie avec une balance de cuisine sur une semaine test."},
  {id:"m_q2",emoji:"🍗",titre:"Qualite des sources proteiques",txt:"Toutes les proteines n ont pas la meme valeur biologique. Les proteines vegetales seules (sans complementarite) ont un profil en acides amines moins complet que les proteines animales."},
  {id:"m_q3",emoji:"🍗",titre:"Les jours de jeune font chuter la moyenne",txt:"Un jour de jeune religieux a 0g de proteines fait chuter ta moyenne hebdomadaire meme si les 6 autres jours sont a 165g pile."},
  {id:"m_q4",emoji:"🍗",titre:"165g c est peut-etre insuffisant pour toi",txt:"A 86kg en deficit avec objectif de retention musculaire, la fourchette haute recommandee est plutot 2-2,2g/kg de poids de corps, soit jusqu a 190g — teste une hausse ponctuelle."},
  {id:"m_q5",emoji:"🍗",titre:"Le poids de reference doit etre le poids maigre",txt:"Calculer tes besoins sur ton poids total (86kg) plutot que ta masse maigre estimee peut sous-estimer tes besoins reels si ta masse grasse est elevee."},
  {id:"m_q6",emoji:"🍗",titre:"Verifie les proteines de tes sauces et accompagnements",txt:"Le houmous, le tahini, les sauces au yaourt comptent peu de proteines reelles malgre une impression de repas copieux — ne les compte pas comme source principale."},
  {id:"m_q7",emoji:"🍗",titre:"Les proteines en poudre ne sont pas equivalentes",txt:"Une whey a 70% de proteines sur extrait sec (fromagere) donne moins de proteines reelles par dosette qu une whey isolat a 90%+ pour le meme volume mesure."},
  {id:"m_q8",emoji:"🍗",titre:"Attention aux jours d ecart social",txt:"Un repas au restaurant ou en famille souvent riche en glucides/lipides mais pauvre en proteines pures peut faire chuter ta moyenne de la semaine sans que tu t en rendes compte."},
  {id:"m_q9",emoji:"🍗",titre:"Le fromage blanc 0% n est pas neutre en volume",txt:"150g de fromage blanc 0% donnent seulement 15g de proteines — il en faut beaucoup pour atteindre 40g sur un seul repas, verifie que le volume suit."},
  {id:"m_q10",emoji:"🍗",titre:"Track sur 7 jours glissants, pas 1 jour",txt:"Une moyenne hebdomadaire de 165g peut cacher des jours a 100g et des jours a 220g — la variabilite jour a jour compte aussi pour la retention musculaire."},
  {id:"m_e1",emoji:"🏋️",titre:"Le stimulus est roi, pas la nutrition seule",txt:"Sans surcharge progressive (plus de charge, plus de reps, ou meilleure technique), le muscle n a aucune raison de se maintenir en deficit calorique — les proteines seules ne suffisent pas."},
  {id:"m_e2",emoji:"🏋️",titre:"2 seances/semaine peut etre le facteur limitant",txt:"Pour maximiser la retention musculaire en deficit, 2 seances par semaine par groupe musculaire est un minimum — verifie que chaque groupe est stimule au moins 2x/semaine."},
  {id:"m_e3",emoji:"🏋️",titre:"Le volume doit suivre le deficit, pas chuter avec lui",txt:"Beaucoup reduisent involontairement leur volume d entrainement en deficit calorique (moins d energie) — c est souvent le vrai coupable de la perte musculaire, pas les proteines."},
  {id:"m_e4",emoji:"🏋️",titre:"Es-tu proche de l echec sur tes dernieres series ?",txt:"Un stimulus insuffisant (arreter loin de l echec, RIR 4-5 systematique) ne declenche pas assez de tension mecanique pour justifier le maintien musculaire."},
  {id:"m_e5",emoji:"🏋️",titre:"La regle des 2 pour 2",txt:"Si tu reussis toutes tes reps cibles sur 2 seances consecutives, augmente la charge. Stagner sur les charges pendant plusieurs semaines = signal d alerte."},
  {id:"m_e6",emoji:"🏋️",titre:"Le detraining commence vite",txt:"A partir de 10-14 jours sans stimulus sur un groupe musculaire, la perte de force et de volume commence. Verifie qu aucun groupe n est neglige plus de 2 semaines."},
  {id:"m_e7",emoji:"🏋️",titre:"Fatigue chronique = moins bonnes seances",txt:"Si tu es fatigue (travail, sommeil), tes seances perdent en qualite sans que tu le remarques consciemment — le poids souleve baisse progressivement, invisible seance apres seance."},
  {id:"m_e8",emoji:"🏋️",titre:"Le nombre de series hebdomadaires compte",txt:"En dessous de 8-10 series hebdomadaires par groupe musculaire, le stimulus est souvent insuffisant pour maintenir le muscle en deficit calorique."},
  {id:"m_e9",emoji:"🏋️",titre:"As-tu recemment change de programme ?",txt:"Un changement d exercices trop frequent empeche de suivre la progression de charge et peut masquer une stagnation reelle du stimulus."},
  {id:"m_e10",emoji:"🏋️",titre:"La technique se degrade sans t en rendre compte",txt:"Une amplitude qui se reduit progressivement (par fatigue ou habitude) diminue le stimulus reel meme si le poids affiche sur la barre reste identique."},
  {id:"m_ca1",emoji:"🏃",titre:"Trop de cardio en deficit",txt:"Un volume de cardio eleve (fractionne + marche + escaliers) ajoute au deficit calorique global et augmente le risque de puiser dans le muscle si les calories ne compensent pas."},
  {id:"m_ca2",emoji:"🏃",titre:"Cardio a jeun : attention au volume",txt:"Courir a jeun plus de 30-40 min augmente le catabolisme musculaire, surtout combine a un deficit calorique deja marque."},
  {id:"m_ca3",emoji:"🏃",titre:"Le cardio et la musculation se disputent la recuperation",txt:"Trop de sessions cardio autour des jours de muscu limite la recuperation musculaire et peut freiner la synthese proteique post-seance."},
  {id:"m_ca4",emoji:"🏃",titre:"Prive-toi de cardio les 24h post-muscu",txt:"Une seance cardio intense dans les 24h suivant une seance de muscu lourde peut interferer avec les signaux de recuperation musculaire (effet interference)."},
  {id:"m_ca5",emoji:"🏃",titre:"Le fractionne est plus catabolisant que prevu",txt:"Un fractionne intense sans apport glucidique/proteique adapte peut couter plus cher en muscle qu un footing tranquille, notamment sur des jambes deja fatiguees."},
  {id:"m_ca6",emoji:"🏃",titre:"Compense le cardio en calories, pas juste en proteines",txt:"Chaque grosse session de cardio (course, escaliers) cree un deficit supplementaire qu il faut compenser partiellement en calories totales, pas uniquement en proteines."},
  {id:"m_ca7",emoji:"🏃",titre:"Trop de volume cardio total sur la semaine",txt:"Cumuler course + escaliers + marche intensive plusieurs fois par semaine peut representer un volume d endurance qui entre en concurrence avec les objectifs de force/hypertrophie."},
  {id:"m_ca8",emoji:"🏃",titre:"Le cardio de recuperation ne devrait pas etre a haute intensite",txt:"Une marche ou un jogging leger favorise la recuperation ; un cardio a haute intensite les jours de repos musculaire annule l effet recuperateur recherche."},
  {id:"m_ca9",emoji:"🏃",titre:"Verifie ta frequence cardiaque en fractionne",txt:"Un fractionne trop souvent a une intensite proche du maximum epuise le systeme nerveux central, ce qui degrade indirectement la qualite de tes seances de muscu suivantes."},
  {id:"m_ca10",emoji:"🏃",titre:"Les escaliers ajoutent un volume excentrique sous-estime",txt:"Le travail excentrique des escaliers cree des microlesions musculaires qui necessitent des ressources de recuperation — trop frequent, ca prive le muscle de reconstruction nette."},
  {id:"m_so1",emoji:"😴",titre:"Moins de 7h = catabolisme accru",txt:"En dessous de 7h de sommeil, la secretion d hormone de croissance chute et le cortisol reste eleve plus longtemps — combinaison ideale pour perdre du muscle."},
  {id:"m_so2",emoji:"😴",titre:"La qualite compte autant que la duree",txt:"8h de sommeil fragmente (reveils frequents) n a pas le meme effet reparateur que 7h de sommeil profond continu. Le sommeil profond est la phase cle pour la recuperation musculaire."},
  {id:"m_so3",emoji:"😴",titre:"Le sommeil est anabolique, pas juste reparateur",txt:"Environ 70% de la secretion quotidienne de GH (hormone de croissance) a lieu pendant le sommeil profond — un dette de sommeil chronique reduit directement le potentiel anabolique."},
  {id:"m_so4",emoji:"😴",titre:"Dette de sommeil cumulative",txt:"Une semaine a 6h/nuit cree une dette qu un seul week-end de rattrapage ne compense pas completement niveau hormonal et recuperation musculaire."},
  {id:"m_so5",emoji:"😴",titre:"Horaires de sommeil irreguliers",txt:"Se coucher a des heures tres variables (garde, urgences dentaires tardives) perturbe le rythme circadien et la qualite du sommeil profond, meme si la duree totale semble correcte."},
  {id:"m_so6",emoji:"😴",titre:"Cafeine tardive et sommeil",txt:"Un cafe pris apres 15h peut reduire la proportion de sommeil profond de la nuit meme sans t empecher de t endormir — impact indirect sur la recuperation musculaire."},
  {id:"m_so7",emoji:"😴",titre:"Le stress du lendemain perturbe le sommeil du soir",txt:"Anticiper une grosse journee de cabinet peut degrader la qualite du sommeil la veille sans que tu en aies conscience — le cortisol du soir monte."},
  {id:"m_so8",emoji:"😴",titre:"Ecrans avant de dormir = sommeil profond reduit",txt:"La lumiere bleue retarde la secretion de melatonine et raccourcit la phase de sommeil profond ou se concentre la recuperation musculaire."},
  {id:"m_so9",emoji:"😴",titre:"Sieste : bon complement, pas un substitut",txt:"Une sieste de 20 min compense partiellement un manque ponctuel mais ne remplace pas le sommeil profond nocturne pour la recuperation musculaire."},
  {id:"m_so10",emoji:"😴",titre:"Alcool et sommeil profond",txt:"Meme une consommation moderee d alcool le soir reduit significativement la part de sommeil profond de la nuit, meme si tu t endors plus vite."},
  {id:"m_st1",emoji:"🧠",titre:"Cortisol chronique = catabolisme direct",txt:"Un cortisol eleve en continu (stress professionnel, manque de sommeil) favorise activement la degradation des proteines musculaires pour liberer des acides amines vers le foie."},
  {id:"m_st2",emoji:"🧠",titre:"Le stress du cabinet dentaire est sous-estime",txt:"Des journees intenses avec forte charge cognitive et posturale au fauteuil elevent le cortisol de facon chronique sans effort physique visible."},
  {id:"m_st3",emoji:"🧠",titre:"Stress + deficit calorique = combo a risque",txt:"Un deficit calorique est deja un stress physiologique. Ajoute un stress psychologique chronique et le corps bascule plus facilement en mode catabolique."},
  {id:"m_st4",emoji:"🧠",titre:"Le cortisol du matin, marqueur a surveiller",txt:"Un reveil difficile, une fatigue persistante des le matin, peuvent traduire un cortisol matinal deregle — un signe indirect de stress chronique impactant la recuperation."},
  {id:"m_st5",emoji:"🧠",titre:"Respiration et systeme parasympathique",txt:"Quelques minutes de respiration lente (4-7-8) apres une journee stressante peuvent faire baisser le cortisol circulant avant meme le repas du soir."},
  {id:"m_st6",emoji:"🧠",titre:"La surcharge d entrainement est aussi un stress",txt:"Trop de volume d entrainement sans recuperation suffisante ajoute au stress systemique total, cumule avec le stress professionnel — attention a la charge globale, pas juste calorique."},
  {id:"m_st7",emoji:"🧠",titre:"Pauses actives dans la journee de travail",txt:"Des micro-pauses de quelques minutes entre les patients (marche, etirement) aident a reguler le cortisol accumule pendant les journees chargees."},
  {id:"m_st8",emoji:"🧠",titre:"Le stress chronique affame les muscles avant le gras",txt:"En situation de stress prolonge, le corps mobilise preferentiellement les acides amines musculaires (source d energie rapide) avant les reserves de graisse."},
  {id:"m_st9",emoji:"🧠",titre:"Identifie tes pics de stress hebdomadaires",txt:"Si certains jours de la semaine sont systematiquement plus charges (planning cabinet), anticipe un apport proteique et calorique legerement plus genereux ces jours-la."},
  {id:"m_st10",emoji:"🧠",titre:"Le stress emotionnel compte aussi",txt:"Au-dela du stress professionnel, les tensions personnelles ou l anxiete chronique elevent le cortisol de la meme facon et impactent la retention musculaire."},
  {id:"m_me1",emoji:"📊",titre:"Hydratation et impedance : biais majeur",txt:"Une balance a impedance surestime la masse grasse et sous-estime la masse musculaire si tu es legerement deshydrate au moment de la mesure."},
  {id:"m_me2",emoji:"📊",titre:"Toujours la meme heure, meme condition",txt:"Une mesure prise a jeun un jour et apres un repas un autre jour n est pas comparable — la variation peut donner l illusion d une perte musculaire qui n existe pas."},
  {id:"m_me3",emoji:"📊",titre:"Le lendemain d une seance intense fausse la mesure",txt:"L inflammation musculaire et la retention d eau post-effort intense peuvent temporairement modifier la lecture de la balance a impedance dans un sens ou l autre."},
  {id:"m_me4",emoji:"📊",titre:"Cycle et retention d eau (le cas echeant)",txt:"Certaines variations hormonales naturelles influencent la retention d eau et donc la lecture des balances a impedance — ne pas sur-interpreter une seule mesure."},
  {id:"m_me5",emoji:"📊",titre:"La marge d erreur des balances grand public",txt:"Les balances a impedance domestiques ont une marge d erreur de 3-5% sur la masse musculaire — une baisse de 0,5-1kg peut simplement etre du bruit de mesure, pas une vraie perte."},
  {id:"m_me6",emoji:"📊",titre:"Regarde la tendance sur 4-6 mesures, pas 2",txt:"Une seule comparaison avant/apres est tres sensible au bruit de mesure. Compare la tendance sur plusieurs semaines pour un signal fiable."},
  {id:"m_me7",emoji:"📊",titre:"Sport la veille = mesure faussee",txt:"Meme la consigne officielle le rappelle : une seance la veille de la mesure alterte l hydratation musculaire et peut simuler une perte de masse maigre inexistante."},
  {id:"m_me8",emoji:"📊",titre:"Alcool ou sel la veille",txt:"Un repas sale ou un verre d alcool la veille au soir modifie la retention d eau et fausse la mesure du lendemain matin, meme a jeun."},
  {id:"m_me9",emoji:"📊",titre:"Difference entre masse maigre et masse musculaire pure",txt:"La masse maigre inclut les organes, les os et l eau — une baisse de masse maigre n est pas forcement une baisse de muscle contractile pur."},
  {id:"m_me10",emoji:"📊",titre:"Croise toujours avec un indicateur objectif",txt:"La force en salle (charges soulevees) est un marqueur plus fiable que l impedance seule pour juger d une vraie perte musculaire — si tes charges montent, tu ne perds probablement pas de muscle malgre la balance."},
  {id:"m_vi1",emoji:"⚡",titre:"Vitesse de perte trop rapide",txt:"Perdre plus de 0,7-1% du poids corporel par semaine (soit plus de 600-850g/semaine a 86kg) augmente fortement la part de muscle dans la perte de poids totale."},
  {id:"m_vi2",emoji:"⚡",titre:"Le rythme ideal est plus lent qu on ne pense",txt:"0,3-0,5kg par semaine preserve mieux la masse musculaire qu un rythme de 1kg+/semaine, meme si c est psychologiquement moins satisfaisant a court terme."},
  {id:"m_vi3",emoji:"⚡",titre:"Une perte rapide initiale n est pas du gras",txt:"Les 1-2 premiers kilos perdus en debut de deficit sont majoritairement de l eau et du glycogene — ne pas viser ce rythme comme reference pour la suite."},
  {id:"m_vi4",emoji:"⚡",titre:"Ralentis si la perte s accelere soudainement",txt:"Une acceleration brutale de la perte de poids sans changement de deficit peut indiquer une perte de masse musculaire plutot qu un vrai progres sur le gras."},
  {id:"m_vi5",emoji:"⚡",titre:"Le piege du plateau puis rattrapage brutal",txt:"Apres un plateau, la tentation de couper plus fort les calories pour relancer accelere souvent la perte musculaire plus que la perte de gras."},
  {id:"m_vi6",emoji:"⚡",titre:"Les jours de jeune religieux accelerent le rythme global",txt:"Integres a une semaine deja en deficit, les jours de jeune ajoutent un deficit ponctuel severe qui peut faire deraper le rythme hebdomadaire moyen."},
  {id:"m_vi7",emoji:"⚡",titre:"Poids stable, gras qui baisse = bon signal, pas un echec",txt:"Si le rythme de perte de poids ralentit mais que le tour de taille continue de baisser, c est le signe d une recomposition saine — ne force pas le rythme."},
  {id:"m_vi8",emoji:"⚡",titre:"La restriction extreme est contre-productive au long terme",txt:"Un rythme trop agressif mene souvent a un abandon ou un rebond, avec une reprise de gras superieure a la perte musculaire initiale."},
  {id:"m_vi9",emoji:"⚡",titre:"Verifie ta perte sur 3-4 semaines, pas 1",txt:"Le poids fluctue de 1-2kg naturellement (eau, digestion, hormones) — juge le rythme reel sur une moyenne mobile de plusieurs semaines."},
  {id:"m_vi10",emoji:"⚡",titre:"Un rythme trop lent n est pas non plus optimal",txt:"A l inverse, un deficit trop faible allonge inutilement la phase de restriction, ce qui augmente le risque cumulatif de fatigue et de perte musculaire sur la duree totale."},
  {id:"m_re1",emoji:"🔄",titre:"48-72h entre deux seances du meme groupe",txt:"Solliciter le meme groupe musculaire avant recuperation complete degrade le stimulus net et peut favoriser un bilan proteique negatif localement."},
  {id:"m_re2",emoji:"🔄",titre:"Les DOMS ne sont pas un indicateur fiable",txt:"L absence de courbatures ne veut pas dire recuperation complete — le systeme nerveux central peut rester fatigue plusieurs jours apres une seance lourde."},
  {id:"m_re3",emoji:"🔄",titre:"Semaine de decharge : ne la saute jamais en deficit",txt:"En deficit calorique, la capacite de recuperation est deja reduite — sauter la semaine de decharge programmee accroit le risque de surmenage et de perte musculaire."},
  {id:"m_re4",emoji:"🔄",titre:"Le sommeil est le facteur n1 de la recuperation",txt:"Aucune strategie nutritionnelle ne compense un deficit chronique de sommeil sur la recuperation musculaire — c est le levier prioritaire si le muscle fond."},
  {id:"m_re5",emoji:"🔄",titre:"Recuperation active vs repos total",txt:"Une marche legere les jours de repos favorise la circulation sanguine et la recuperation, contrairement a une inactivite totale qui peut ralentir la reparation musculaire."},
  {id:"m_re6",emoji:"🔄",titre:"Charge d entrainement cumulee sur la semaine",txt:"Ce n est pas seulement la seance du jour qui compte, mais le volume total cumule sur 7-10 jours — une charge trop dense sans jour de vrai repos epuise les reserves de recuperation."},
  {id:"m_re7",emoji:"🔄",titre:"Les etirements et la mobilite comptent aussi",txt:"Une mauvaise recuperation articulaire et myofasciale peut limiter l amplitude de mouvement, donc le stimulus musculaire reel des seances suivantes."},
  {id:"m_re8",emoji:"🔄",titre:"Ecoute les signaux de fatigue systemique",txt:"Frequence cardiaque au repos elevee, irritabilite, motivation en berne : ce sont des signes precoces de recuperation insuffisante avant meme la baisse de performance."},
  {id:"m_re9",emoji:"🔄",titre:"Le froid et le chaud, en complement seulement",txt:"Douche froide ou sauna peuvent aider ponctuellement mais ne remplacent jamais le sommeil et l apport nutritionnel comme piliers de la recuperation musculaire."},
  {id:"m_re10",emoji:"🔄",titre:"Une seance ratee vaut mieux qu une seance forcee",txt:"S entrainer a tout prix en etat de fatigue avancee degrade le stimulus et peut meme etre legerement catabolisant net comparé a un jour de repos supplementaire."},
  {id:"m_gl1",emoji:"🍚",titre:"Les glucides protegent le muscle en deficit",txt:"Un apport glucidique trop bas prive le muscle de son carburant preferentiel a l entrainement, ce qui peut forcer le corps a puiser davantage dans les proteines pour l energie."},
  {id:"m_gl2",emoji:"🍚",titre:"Glycogene bas = moins bonne seance = moins de stimulus",txt:"Des reserves de glycogene insuffisantes avant une seance de muscu reduisent la charge soulevable, donc le stimulus hypertrophique reel de la seance."},
  {id:"m_gl3",emoji:"🍚",titre:"L effet epargneur de proteines des glucides",txt:"Suffisamment de glucides permet au corps d utiliser le gras et le glycogene comme carburant plutot que de degrader les proteines musculaires a des fins energetiques."},
  {id:"m_gl4",emoji:"🍚",titre:"Glucides autour de l entrainement en priorite",txt:"Si tu dois repartir tes glucides, privilegie les 2-3h autour de la seance — c est la ou ils protegent le plus efficacement le muscle du catabolisme."},
  {id:"m_gl5",emoji:"🍚",titre:"Un deficit trop bas en glucides ET en calories cumule les risques",txt:"Faire un double deficit — glucides bas et calories basses — est une des combinaisons les plus a risque pour la perte musculaire en phase de seche."},
  {id:"m_gl6",emoji:"🍚",titre:"Les jours de jeune : compense les jours suivants",txt:"Apres un jeune sans glucides ni proteines, les 24-48h suivantes devraient inclure un apport glucidique legerement superieur pour reconstituer le glycogene musculaire."},
  {id:"m_gl7",emoji:"🍚",titre:"Fatigue inhabituelle en seance = glycogene a verifier",txt:"Si tes seances deviennent difficiles sans raison apparente (sommeil et stress normaux), un manque chronique de glucides est une cause frequente et sous-estimee."},
  {id:"m_gl8",emoji:"🍚",titre:"Le timing des glucides autour du fractionne",txt:"Un peu de glucides avant un fractionne intense preserve les reserves musculaires et reduit le recours au catabolisme proteique pendant l effort."},
  {id:"m_gl9",emoji:"🍚",titre:"Glucides le soir : allie de la recuperation, pas un ennemi",txt:"Contrairement aux idees recues, des glucides le soir favorisent la resynthese de glycogene pendant la nuit et n ont pas d impact negatif specifique sur la perte de gras."},
  {id:"m_gl10",emoji:"🍚",titre:"Trop peu de glucides degrade aussi le sommeil",txt:"Un apport glucidique tres bas peut perturber la production de serotonine et donc la qualite du sommeil — avec un effet indirect sur la recuperation musculaire."},

function computeConseilsData(){
  var journal = S.get('nutJournal') || {};
  var wLog = S.get('wLog') || [];
  var iLog = S.get('iLog') || [];
  var jDays = Object.values(journal);
  var avgKcal = jDays.length ? jDays.reduce(function(s,d){return s+d.totalK;},0)/jDays.length : 2400;
  var avgProt = jDays.length ? jDays.reduce(function(s,d){return s+d.totalP;},0)/jDays.length : 165;
  var weightLost = wLog.length > 1 ? wLog[0].p - wLog[wLog.length-1].p : 0;
  var sessionJournal = S.get('journal') || {};
  var doneWorkouts = Object.values(sessionJournal).filter(function(s){return s.done;}).length;
  return {
    avgKcal: avgKcal,
    avgProt: avgProt,
    journalDays: jDays.length,
    weightCount: wLog.length,
    impCount: iLog.length,
    hasWorkouts: doneWorkouts > 0,
    weightLost: weightLost
  };
}

function getTopConseils(excluded){
  excluded = excluded || [];
  var data = computeConseilsData();
  // Get one best conseil per category
  var result = [];
  CONSEIL_CATS.forEach(function(cat){
    var catItems = ALL_CONSEILS.filter(function(c){
      return c.cat === cat && excluded.indexOf(c.id) < 0;
    });
    if(!catItems.length) return;
    catItems.sort(function(a,b){ return b.score(data) - a.score(data); });
    result.push(catItems[0]);
  });
  return result;
}

function getRandomConseils(excluded, count){
  excluded = excluded || [];
  var data = computeConseilsData();
  var available = ALL_CONSEILS.filter(function(c){ return excluded.indexOf(c.id) < 0; });
  // Shuffle with score weighting
  available.sort(function(a,b){
    return (b.score(data) + Math.random()*4) - (a.score(data) + Math.random()*4);
  });
  return available.slice(0, count || 3);
}

  const days = Object.values(journal).sort((a,b)=>b.date.localeCompare(a.date));
  let h = renderJeuneBandeau();
  h += `<div style="font-size:13px;color:#9CA3AF;margin-bottom:14px;line-height:1.5">
    Historique de tes journées alimentaires. Enregistre chaque soir depuis l'onglet Nutrition.
  </div>`;

  const todayStr = parisDateStr();
  const todayData = (S.get('nutJournal')||{})[todayStr];

  // Today pinned at top
  if(todayData){
    const todayDate = new Date(todayStr);
    const todayLabel = todayDate.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
    const kPctT = Math.min((todayData.totalK/2400)*100,100);
    const pPctT = Math.min((todayData.totalP/165)*100,100);
    const kColT = todayData.totalK > 2500 ? '#EF4444' : todayData.totalK < 1800 ? '#F59E0B' : '#10B981';
    const pColT = todayData.totalP < 140 ? '#F59E0B' : '#10B981';
    h += '<div style="background:linear-gradient(135deg,#1E3A5F,#0F2B2B);border-radius:14px;padding:14px;border:1.5px solid #3B82F6;margin-bottom:14px">';
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">';
    h += '<span style="font-size:18px">📅</span>';
    h += '<div><div style="font-weight:800;font-size:15px;color:#F1F1F5;text-transform:capitalize">'+todayLabel+'</div>';
    h += '<div style="font-size:10px;color:#3B82F6;font-weight:700">Journée en cours</div></div>';
    h += '<button onclick="goToNutrition()" style="margin-left:auto;padding:6px 10px;border-radius:8px;border:none;background:#3B82F6;color:#fff;font-size:11px;font-weight:700">Modifier</button>';
    h += '</div>';
    h += '<div style="display:flex;gap:7px;margin-bottom:8px">';
    h += '<div style="flex:1;background:#14141F;border-radius:9px;padding:10px">';
    h += '<div style="font-size:9px;color:#6B7280;margin-bottom:2px">Calories</div>';
    h += '<div style="font-size:20px;font-weight:800;color:'+kColT+'">'+todayData.totalK+'<span style="font-size:11px;color:#6B7280"> / 2400</span></div>';
    h += '<div class="pb-bg" style="margin-top:4px"><div class="pb-fill" style="width:'+kPctT+'%;background:'+kColT+'"></div></div></div>';
    h += '<div style="flex:1;background:#14141F;border-radius:9px;padding:10px">';
    h += '<div style="font-size:9px;color:#6B7280;margin-bottom:2px">Protéines</div>';
    h += '<div style="font-size:20px;font-weight:800;color:'+pColT+'">'+todayData.totalP+'g<span style="font-size:11px;color:#6B7280"> / 165</span></div>';
    h += '<div class="pb-bg" style="margin-top:4px"><div class="pb-fill" style="width:'+pPctT+'%;background:'+pColT+'"></div></div></div>';
    h += '</div>';
    h += renderDayMeals(todayData);
    h += '</div>';
  } else {
    h += '<div style="background:#1E1E2E;border-radius:14px;padding:14px;border:1px solid #2D2D3F;margin-bottom:14px;text-align:center">';
    h += '<div style="font-size:28px;margin-bottom:6px">📅</div>';
    h += '<div style="font-size:13px;color:#9CA3AF;margin-bottom:10px">Rien de saisi pour aujourd hui encore.</div>';
    h += '<button onclick="goToNutrition()" style="padding:8px 16px;border-radius:9px;border:none;background:#3B82F6;color:#fff;font-size:12px;font-weight:700">Saisir mes repas</button>';
    h += '</div>';
  }

  if(days.length === 0){
    h += '<div class="gbox">💡 Aucune journée enregistrée. Va dans Nutrition, saisis tes repas et appuie sur 💾 Enregistrer.</div>';
    document.getElementById('t-journal').innerHTML = h;
    return;
  }

  // Résumé hebdo si assez de données
  if(days.length >= 3){
    const last7 = days.slice(0,7);
    const avgK = Math.round(last7.reduce(function(s,d){return s+d.totalK;},0)/last7.length);
    const avgP = Math.round(last7.reduce(function(s,d){return s+d.totalP;},0)/last7.length);
    const avgKColor = avgK>2400?'#EF4444':'#10B981';
    const avgPColor = avgP<165?'#F59E0B':'#10B981';
    const avgKTxt = avgK>2400?"⚠ au-dessus":"✓ objectif ok";
    const avgPTxt = avgP<165?'↗ vise 165g':'✓ objectif atteint';
    h += '<div class="card" style="margin-bottom:12px">';
    h += '<div class="slbl">📊 Moyenne (' + last7.length + ' derniers jours)</div>';
    h += '<div style="display:flex;gap:7px">';
    h += '<div class="sbox"><div style="font-size:9px;color:#6B7280;margin-bottom:3px">Calories moy.</div>';
    h += '<div style="font-size:20px;font-weight:800;color:#F59E0B">' + avgK + '<span style="font-size:11px;color:#6B7280"> kcal</span></div>';
    h += '<div style="font-size:9px;color:' + avgKColor + '">' + avgKTxt + '</div></div>';
    h += '<div class="sbox"><div style="font-size:9px;color:#6B7280;margin-bottom:3px">Protéines moy.</div>';
    h += '<div style="font-size:20px;font-weight:800;color:#3B82F6">' + avgP + 'g</div>';
    h += '<div style="font-size:9px;color:' + avgPColor + '">' + avgPTxt + '</div></div>';
    h += '</div></div>';
  }

  // Rappel dimanche 22h
  const now = new Date();
  const isSunday = parisDay() === 0;
  const isEvening = parisHour() >= 20;
  if(isSunday && isEvening){
    h += `<div class="ybox">📋 Dimanche soir — récap de ta semaine ci-dessous !</div>`;
  }

  // Liste des journées
  days.forEach(function(day){
    const date = new Date(day.date);
    const dateStr = date.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
    const kPct = Math.min((day.totalK/2400)*100,100);
    const pPct = Math.min((day.totalP/165)*100,100);
    const kColor = day.totalK > 2500 ? '#EF4444' : day.totalK < 2000 ? '#F59E0B' : '#10B981';
    const pColor = day.totalP < 140 ? '#F59E0B' : '#10B981';
    const mealsDetail = renderDayMeals(day);

    h += '<div class="card">';
    h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">';
    h += '<div>';
    h += '<div style="font-weight:800;font-size:14px;color:#F1F1F5;text-transform:capitalize">' + dateStr + '</div>';
    h += '<div style="font-size:10px;color:#6B7280">Enregistré à ' + (day.savedAt||'—') + '</div>';
    h += '</div>';
    h += '<div style="display:flex;gap:6px">';
    h += '<button data-date="' + day.date + '" onclick="loadDayBtn(this)" style="padding:5px 8px;border-radius:7px;border:none;background:#1E3A5F;color:#93C5FD;font-size:10px;font-weight:700">Recharger</button>';
    h += '<button data-date="' + day.date + '" onclick="deleteDayBtn(this)" style="padding:5px 8px;border-radius:7px;border:none;background:#3A1A1A;color:#EF4444;font-size:10px;font-weight:700">✕</button>';
    h += '</div></div>';
    h += '<div style="display:flex;gap:7px;margin-bottom:10px">';
    h += '<div style="flex:1;background:#14141F;border-radius:9px;padding:9px;border:1px solid ' + kColor + '30">';
    h += '<div style="font-size:9px;color:#6B7280;margin-bottom:2px">Calories</div>';
    h += '<div style="font-size:18px;font-weight:800;color:' + kColor + '">' + day.totalK + '</div>';
    h += '<div class="pb-bg" style="margin-top:4px"><div class="pb-fill" style="width:' + kPct + '%;background:' + kColor + '"></div></div>';
    h += '</div>';
    h += '<div style="flex:1;background:#14141F;border-radius:9px;padding:9px;border:1px solid ' + pColor + '30">';
    h += '<div style="font-size:9px;color:#6B7280;margin-bottom:2px">Protéines</div>';
    h += '<div style="font-size:18px;font-weight:800;color:' + pColor + '">' + day.totalP + 'g</div>';
    h += '<div class="pb-bg" style="margin-top:4px"><div class="pb-fill" style="width:' + pPct + '%;background:' + pColor + '"></div></div>';
    h += '</div></div>';
    h += mealsDetail;
    h += '</div>';
  });

  document.getElementById('t-journal').innerHTML = h;
}

function renderDayMeals(day){
  if(!day.selections) return '';
  const slots = {pdj:'☀️ Petit déj', dej:'🍽️ Déjeuner', gouter:'🍎 Goûter', snack:'💪 Snack', diner:'🌙 Dîner'};
  let h = '<div style="border-top:1px solid #2D2D3F;padding-top:8px">';
  let hasAny = false;
  Object.entries(slots).forEach(function(entry){
    const id = entry[0], lbl = entry[1];
    const sel = day.selections[id]||{};
    const manual = (day.manual||{})[id]||[];
    const items = [];
    Object.entries(sel).forEach(function(e){ items.push({n:e[0],q:e[1]}); });
    manual.forEach(function(m){ items.push({n:m.n,q:m.qty}); });
    if(items.length === 0) return;
    hasAny = true;
    let itemsHtml = '';
    items.forEach(function(i){
      const a = ALIMENTS[i.n];
      const m = calcMacros(i.n, i.q);
      if(itemsHtml) itemsHtml += ' · ';
      itemsHtml += (a&&a.emoji?a.emoji:'🍽️') + ' ' + i.n + ' ' + i.q + 'g <span style="color:#4B5563">(' + m.k + 'kcal)</span>';
    });
    h += '<div style="margin-bottom:6px">';
    h += '<div style="font-size:10px;font-weight:700;color:#9CA3AF;margin-bottom:3px">' + lbl + '</div>';
    h += '<div style="font-size:11px;color:#6B7280;line-height:1.6">' + itemsHtml + '</div>';
    h += '</div>';
  });
  h += '</div>';
  return hasAny ? h : '';
}

function loadDay(date){
  ST.nutDate = date;
  const saved = (S.get('nutJournal')||{})[date];
  if(saved){
    ST.nutSelections = JSON.parse(JSON.stringify(saved.selections||{}));
    ST.nutManual = JSON.parse(JSON.stringify(saved.manual||{}));
  }
  nav('nutrition', document.querySelector('.nbtn:nth-child(2)'));
}

function loadDayBtn(btn){ loadDay(btn.getAttribute('data-date')); }

function deleteDay(date){
  const journal = S.get('nutJournal')||{};
  delete journal[date];
  S.set('nutJournal', journal);
  renderJournal();
}

function deleteDayBtn(btn){ deleteDay(btn.getAttribute('data-date')); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
function render(t){
  ST._activeTab = t;
  if(t==='semaine')renderSem();
  else if(t==='nutrition')renderNut();
  else if(t==='journal')renderJournal();
  else if(t==='tracker')renderTr();
  else if(t==='exercices')renderEx();
  else if(t==='jeune')renderJeunePage();
}

// Load custom aliments from localStorage into ALIMENTS
(function loadCustomAliments(){
  // Nettoyage unique : les anciens "Mes aliments" ont été promus dans la liste
  // classique (Datte, Thon cru, Tomate mozza, Couscous de Chabbat, Hipro 25g...)
  // — on vide le reste une seule fois.
  if(!S.get('customAlimentsCleanupV1')){
    S.set('customAliments', {});
    S.set('customAlimentsCleanupV1', true);
  }
  var custom = S.get('customAliments') || {};
  Object.keys(custom).forEach(function(name){
    var a = custom[name];
    ALIMENTS[name] = {k:a.k, p:a.p, g:a.g, l:a.l, emoji:'🍽️', cat:'Mes aliments'};
  });
  // Add 'Mes aliments' to cats if not there
  if(ALIMENT_CATS.indexOf('Mes aliments') < 0 && Object.keys(custom).length > 0){
    ALIMENT_CATS.push('Mes aliments');
  }
  // Charge aussi les aliments "journal seulement" (pas dans la liste, mais
  // nécessaires pour recalculer les macros des journées déjà enregistrées)
  var journalOnly = S.get('journalOnlyAliments') || {};
  Object.keys(journalOnly).forEach(function(name){
    if(!ALIMENTS[name]){
      var a = journalOnly[name];
      ALIMENTS[name] = {k:a.k, p:a.p, g:a.g, l:a.l, emoji:'🍽️', cat:'Journal'};
    }
  });
})();

// Auto-load today's nutrition data on startup
(function initNutrition(){
  const today = parisDateStr();
  // Restore last selected week
  var savedWeek = S.get('lastWeek');
  if(savedWeek && savedWeek >= 1 && savedWeek <= 10) ST.week = savedWeek;

  ST.nutDate = today;
  const saved = (S.get('nutJournal')||{})[today];
  if(saved && saved.selections){
    ST.nutSelections = JSON.parse(JSON.stringify(saved.selections));
    ST.nutManual = JSON.parse(JSON.stringify(saved.manual||{}));
  }
  // Purge entries older than 7 days
  const journal = S.get('nutJournal')||{};
  const cutoffDate = new Date();
  cutoffDate.setDate(cutoffDate.getDate()-7);
  const cutoffStr = cutoffDate.toLocaleDateString('fr-CA',{timeZone:'Europe/Paris'});
  let purged = false;
  Object.keys(journal).forEach(function(d){
    if(d < cutoffStr){ delete journal[d]; purged=true; }
  });
  if(purged) S.set('nutJournal', journal);

  // Restaurer l'état jeûne depuis localStorage s'il était actif
  var savedJeune = S.get('jeuneState');
  if(savedJeune){
    try {
      var jst = JSON.parse(savedJeune);
      if(jst.jeuneActif){ ST.jeuneActif=jst.jeuneActif; ST.jeuneNom=jst.jeuneNom||''; ST.jeuneDebut=jst.jeuneDebut; ST.jeuneFin=jst.jeuneFin; ST.jeuneDate=jst.jeuneDate; }
    } catch(e){}
  }
})();

// Timer live : rafraîchit le bandeau jeûne chaque minute si actif
setInterval(function(){
  if(ST.jeuneActif){
    S.set('jeuneState', JSON.stringify({jeuneActif:true, jeuneNom:ST.jeuneNom, jeuneDebut:ST.jeuneDebut, jeuneFin:ST.jeuneFin, jeuneDate:ST.jeuneDate}));
    // Highlight bouton nav jeûne
    var jBtn = document.getElementById('nbtn-jeune');
    if(jBtn && !jBtn.classList.contains('act')) jBtn.style.color = '#C4B5FD';
    // Rafraîchir l'onglet actif (bandeau mis à jour partout)
    if(ST._activeTab) render(ST._activeTab);
  } else {
    S.set('jeuneState', null);
    var jBtn2 = document.getElementById('nbtn-jeune');
    if(jBtn2) jBtn2.style.color = '';
  }
}, 60000);

renderSem();
</script>
